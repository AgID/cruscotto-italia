name: ETL · ASIA Bootstrap (GitHub-hosted)

# Workflow ad hoc per primo pull ASIA, da girare UNA VOLTA su GitHub-hosted
# runner (Azure datacenter, IP differente da Aruba).
#
# Motivo: IP di Aruba bannato da esploradati.istat.it dopo 39 chiamate
# consecutive (test 2026-05-15). Bypassiamo Aruba completamente facendo
# il pull dai runner GitHub (IP Azure), pubblicando direttamente i shard
# su R2 + rebuild dashboard A1.
#
# Negli anni successivi, il job 'asia' di etl-annual.yml gira normalmente
# su Aruba (1 febbraio), quando il ban sara' sicuramente scaduto.

on:
  workflow_dispatch:
    inputs:
      run_dashboard:
        description: 'Anche rebuild dashboard A1 dopo il push asia?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
  R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET:            cruscotto-italia-data

jobs:
  asia-bootstrap:
    name: ETL · ASIA pull + push R2 (GitHub-hosted runner)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install requirements
        run: pip install -r etl/requirements.txt

      - name: Show runner IP (debug, sara' utile se ISTAT banna anche questo)
        run: |
          echo "Runner public IP:"
          curl -sS -m 5 https://api.ipify.org || echo "(unable to detect)"
          echo ""

      - name: ASIA ETL pull + push R2 (polite mode)
        run: python -m etl.sources.asia --target=r2 2>&1
        # Polite mode gia' committato in asia.py: parallelismo=1, sleep 3s
        # tra chunks, backoff 60-240s su 503/timeout. Stima 90-120 min.

      - name: Verify shard count on R2
        run: |
          python3 <<'PY'
          import os, boto3
          s3 = boto3.client('s3',
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              region_name='auto')
          n = 0
          for page in s3.get_paginator('list_objects_v2').paginate(
                  Bucket=os.environ['R2_BUCKET'], Prefix='asia/'):
              n += len(page.get('Contents', []))
          print(f"ASIA shards on R2: {n}")
          assert n >= 7000, f"Expected >=7000 shards, got {n}"
          PY

  dashboard-rebuild:
    name: ETL · Dashboard rebuild (post-asia)
    runs-on: ubuntu-latest
    needs: asia-bootstrap
    if: ${{ github.event.inputs.run_dashboard == 'true' && needs.asia-bootstrap.result == 'success' }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Rebuild dashboard A1 with asia integrated
        run: python -m etl.sources.dashboard --target=r2 2>&1
