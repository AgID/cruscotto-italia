name: ETL · Annual (smoke test)

# IMPORTANTE — LEGGERE PRIMA DI TRIGGERARE
# =========================================
# Questo workflow NON e' il produttore reale dei dati annual in produzione.
# Il produttore reale e' il cron `/etc/cron.d/cruscotto-etl` sulla VM AgID
# che esegue gli stessi comandi Python in 3 finestre annuali:
#   - 1 febbraio 04:00 UTC
#   - 1 aprile   04:00 UTC
#   - 1 luglio   04:00 UTC
# scrivendo direttamente in /var/www/cruscotto-italia/data/.
#
# I dati che il sito www.cruscotto-italia.dati.gov.it e il Worker MCP
# servono in produzione sono SEMPRE quelli prodotti dal cron VM, non da
# questo workflow GitHub Actions.
#
# Perche' allora esiste questo workflow?
# --------------------------------------
# E' un "fallback documentale": un revisore (es. AgID) puo' aprirlo dalla
# UI Actions e leggere i comandi Python che il cron VM esegue. Inoltre,
# in caso futuro di sblocco WAF (vedi sotto), puo' essere riattivato
# come producer secondario.
#
# Perche' i job qui sotto attualmente FALLISCONO su ubuntu-latest
# ---------------------------------------------------------------
# Tutte le fonti istituzionali italiane oggetto degli ETL annual sono
# protette da WAF (F5 Volterra, Akamai, ecc.) che restituiscono HTTP 403
# Forbidden per richieste provenienti da IP cloud-hosted (Microsoft Azure
# subnet, dove GitHub Actions ubuntu-latest gira).
#
# Diagnostica analoga ai workflow weekly e monthly:
#  - demografia (ISTAT POSAS): probabile 403 da Azure
#  - aria (ISPRA SNPA): probabile 403 da Azure
#  - turismo (ISTAT SDMX): probabile 403 da Azure
#  - territorio (ISPRA + IdroGEO + Catasto rifiuti): probabile 403 da Azure
#  - veicoli (ACI LOD + ISTAT): probabile 403 da Azure
#  - redditi (MEF Finanze): probabile 403 da Azure
#  - immobili_pa (MEF DE): probabile 403 da Azure
#  - scuole (MIUR): probabile 403 da Azure
#
# Le stesse URL ritornano HTTP 200 + dati validi quando interrogate da IP
# italiano (Aruba/VM AgID). Per questo motivo gli ETL girano dalla VM, mai
# da Actions cloud-hosted.
#
# Casi particolari (ISTAT, soggetti a host-ban anziche' cloud-restrict)
# ---------------------------------------------------------------------
# I 3 ETL ISTAT pesanti (istat_profilo, pendolarismo, asia) hanno un
# pattern DIVERSO: ISTAT esploradati ha bannato l'IP della VM Aruba per
# precedente abuso. Quindi:
#   - Dal cron VM: 403 da ISTAT (IP bannato)
#   - Da Actions ubuntu-latest: 200 OK (IP Azure non bannato)
# Per questo motivo NON sono inclusi qui ma in 3 workflow separati:
#   etl-istat_profilo-refresh.yml
#   etl-pendolarismo-refresh.yml
#   etl-asia-refresh.yml
# che girano su ubuntu-latest, salvano output come artifact GitHub, e
# il cron VM li scarica via scripts/etl/pull_artifact.py (vedi cron
# entry alle 07:30 UTC daily).
#
# Validazione freshness dati in produzione
# ----------------------------------------
# Per verificare che il cron VM stia effettivamente aggiornando i dati,
# non usare questo workflow. Usare invece:
#
#   curl -s -X POST "https://cruscotto-italia-mcp.agid.workers.dev/mcp" \
#     -H "Content-Type: application/json" \
#     -d '{"jsonrpc":"2.0","method":"tools/call","id":1,
#          "params":{"name":"comune_dashboard",
#                    "arguments":{"istat_code":"075035"}}}' \
#     | jq '.result.content[0].text | fromjson | {_generated_at, _missing}'
#
# Il campo `_generated_at` deve essere recente. Per dati annuali la soglia
# di freschezza dipende dalla pubblicazione upstream: tipicamente entro
# 12 mesi dall'ultima finestra cron (1 feb / 1 apr / 1 lug).
#
# Log produttivi
# --------------
# I log del cron VM annual sono in /var/log/cruscotto-etl/<source>-YYYYMMDD.log
# sull'host di produzione (file prodotto solo nelle 3 finestre annuali).

on:
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated list (demografia,aria,turismo,territorio,veicoli,redditi,immobili_pa,scuole) or "all"'
        required: false
        default: 'all'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Demografia (ISTAT POSAS) — popolazione residente per eta'/sesso
  demografia:
    name: ETL · Demografia (atteso fail su Azure)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'demografia') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run Demografia ETL (atteso HTTP 403)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke/demografia
          python -m etl.sources.demografia --outdir=/tmp/etl-smoke/demografia 2>&1 | tee /tmp/demografia-etl.log | tail -30

  # ---------------------------------------------------------------------------
  # Aria (ISPRA SNPA) — qualita' aria PM10/PM2.5/NO2 per comune
