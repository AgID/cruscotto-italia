name: ETL Pendolarismo bootstrap

# Workflow ad hoc per primo pull pendolarismo 2021 via GitHub-hosted runner
# (IP Azure non bannato da ISTAT). Output: shard JSON in data/pendolarismo/
# committati direttamente su main.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Smoke test: ISTAT comma-separated (vuoto = full).'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  pendolarismo-bootstrap:
    name: ETL pendolarismo 2021
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install requirements
        run: pip install -r etl/requirements.txt

      - name: Show runner IP
        run: |
          echo "Runner public IP:"
          curl -sS -m 5 https://api.ipify.org || echo "(unable to detect)"
          echo ""

      - name: Run pendolarismo ETL
        run: |
          if [ -n "${{ inputs.limit }}" ]; then
            python -m etl.sources.pendolarismo --target=local-repo --outdir=data/pendolarismo --limit="${{ inputs.limit }}" 2>&1 | tee /tmp/pend.log
          else
            python -m etl.sources.pendolarismo --target=local-repo --outdir=data/pendolarismo 2>&1 | tee /tmp/pend.log
          fi

      - name: Statistiche shard prodotti
        run: |
          echo "=== Shard prodotti ==="
          ls data/pendolarismo/*.json 2>/dev/null | wc -l
          echo "=== Size totale ==="
          du -sh data/pendolarismo/ 2>/dev/null || echo "no directory"
          echo "=== Sample primo shard ==="
          first=$(ls data/pendolarismo/*.json 2>/dev/null | head -1)
          if [ -n "$first" ]; then
            echo "File: $first"
            head -c 1500 "$first"
            echo ""
          fi

      - name: Commit shard su main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pendolarismo/
          if git diff --staged --quiet; then
            echo "Nessun cambiamento da committare"
            exit 0
          fi
          N=$(ls data/pendolarismo/*.json 2>/dev/null | wc -l)
          git commit -m "data(pendolarismo): bootstrap ISTAT 2021 LAVORO - ${N} shard"
          git push origin HEAD:main
