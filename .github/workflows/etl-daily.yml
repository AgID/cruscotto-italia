name: ETL · Daily

# Cadenza giornaliera per fonti che aggiornano quotidianamente:
#  - PUN (Piattaforma Unica Nazionale punti di ricarica, GSE/MASE)
#    Il file `gse-pun-prod-documents/PA/infrastrutture.csv` viene rigenerato
#    lato GSE ogni mattina ~03:00 UTC. L'ETL include skip automatico via
#    HEAD LastModified persistito in `pun/_meta.json`: se la fonte non e'
#    cambiata, il job termina in ~1s senza scaricare nulla.
#  - Carburanti (MIMIT Osservatorio Prezzi Carburanti, art. 51 L. 99/2009)
#    I file `anagrafica_impianti_attivi.csv` e `prezzo_alle_8.csv` su
#    `www.mimit.gov.it` vengono rigenerati ogni mattina dal Ministero
#    (snapshot "Prezzo alle 8 di mattina" del giorno precedente). L'ETL
#    include skip automatico via hash SHA-256 combinato dei due CSV,
#    persistito in `carburanti/_meta.json`: se entrambi i file sono
#    invariati, il job termina senza ricalcolo shard.
#
# Al termine, se almeno un ETL upstream ha effettivamente prodotto
# aggiornamenti, ricostruisce dashboard/<istat>.json e notifica la worker.
#
# Cron: ogni giorno alle 08:00 UTC = 09:00/10:00 ora di Roma (DST).
# 08:00 UTC scelto come compromesso solido per le 2 sorgenti upstream:
#   - GSE PUN: rigenera ~03:00 UTC (Last-Modified osservato 2026-05-09)
#   - MIMIT carburanti: pubblica prezzo_alle_8.csv e anagrafica
#     ~06:45-06:51 UTC (= 08:45/08:51 IT DST), nonostante il nome
#     'prezzo_alle_8' si riferisca al momento di RILEVAZIONE delle 8 IT
#     non a quello di pubblicazione del CSV.
# Margine: ~70 min post-MIMIT. Il job termina entro le 09:00 UTC
# pubblicando dati freschi per quando l'utente apre il sito al mattino.

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated list (pun,carburanti,dashboard) or "all"'
        required: false
        default: 'all'
      force:
        description: "PUN/Carburanti: forza esecuzione anche se sorgente non e' cambiata. Default false."
        required: false
        default: 'false'

env:
  R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
  R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET:            cruscotto-italia-data

jobs:
  # ---------------------------------------------------------------------------
  pun:
    name: ETL · PUN (punti di ricarica veicoli elettrici)
    runs-on: [self-hosted, linux, aruba]
    if: ${{ github.event_name == 'schedule' || contains(github.event.inputs.sources, 'pun') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 30
    outputs:
      ran: ${{ steps.pun_run.outputs.ran }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Compute --force flag
        id: force
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "flag=--force" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi
      - name: Run PUN ETL
        id: pun_run
        # Lo skip-by-LastModified e' interno all'ETL: se la fonte e' invariata
        # l'ETL termina con "pun_skip" e i job downstream non vengono triggerati.
        # Catturiamo il log per discriminare "skip" da "esecuzione effettiva".
        run: |
          set -o pipefail
          python -m etl.sources.pun --target=r2 ${{ steps.force.outputs.flag }} \
            2>&1 | tee /tmp/pun-etl.log
          if grep -q "pun_skip" /tmp/pun-etl.log; then
            echo "ran=false" >> $GITHUB_OUTPUT
            echo "PUN skipped: LastModified invariato."
          else
            echo "ran=true" >> $GITHUB_OUTPUT
            echo "PUN executed: shard aggiornati."
          fi

  # ---------------------------------------------------------------------------
  carburanti:
    name: ETL · Carburanti (MIMIT — distributori e prezzi)
    runs-on: [self-hosted, linux, aruba]
    if: ${{ github.event_name == 'schedule' || contains(github.event.inputs.sources, 'carburanti') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 30
    outputs:
      ran: ${{ steps.carburanti_run.outputs.ran }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Compute --force flag
        id: force
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "flag=--force" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi
      - name: Run Carburanti ETL
        id: carburanti_run
        # Lo skip-by-hash e' interno all'ETL: se entrambi i CSV MIMIT sono
        # invariati l'ETL termina con "carburanti_skip" e i job downstream
        # non vengono triggerati.
        run: |
          set -o pipefail
          python -m etl.sources.carburanti --target=r2 ${{ steps.force.outputs.flag }} \
            2>&1 | tee /tmp/carburanti-etl.log
          if grep -q "carburanti_skip" /tmp/carburanti-etl.log; then
            echo "ran=false" >> $GITHUB_OUTPUT
            echo "Carburanti skipped: hash CSV invariato."
          else
            echo "ran=true" >> $GITHUB_OUTPUT
            echo "Carburanti executed: shard aggiornati."
          fi

  # ---------------------------------------------------------------------------
  # Dashboard rebuild parte SOLO se almeno un ETL upstream (PUN o Carburanti)
  # ha effettivamente prodotto aggiornamenti. Senza modifiche su R2, ricostruire
  # il dashboard sarebbe lavoro inutile (i ~7896 unified shard sarebbero
  # identici a quelli gia' presenti).
  dashboard:
    name: ETL · Dashboard rebuild (single-fetch shard)
    runs-on: [self-hosted, linux, aruba]
    needs: [pun, carburanti]
    if: ${{ always() && (needs.pun.outputs.ran == 'true' || needs.carburanti.outputs.ran == 'true') && (github.event_name == 'schedule' || contains(github.event.inputs.sources, 'dashboard') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '') }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Run Dashboard ETL
        run: python -m etl.sources.dashboard --target=r2

  # ---------------------------------------------------------------------------
  notify:
    name: Notify worker (cache purge)
    needs: [dashboard]
    if: ${{ always() && needs.dashboard.result == 'success' }}
    runs-on: [self-hosted, linux, aruba]
    steps:
      - name: Purge worker cache
        run: |
          curl -sS -X POST "https://cruscotto-italia-mcp.datigovit.workers.dev/admin/cache/purge" \
            -H "Authorization: Bearer ${{ secrets.WORKER_ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
          || echo "Cache purge endpoint non disponibile (non-critical)"
