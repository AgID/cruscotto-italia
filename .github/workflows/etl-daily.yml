name: ETL · Daily (smoke test)

# IMPORTANTE
# ==========
# Questo workflow NON e' il produttore reale dei dati daily in produzione.
# Il produttore reale e' il cron `/etc/cron.d/cruscotto-etl` sulla VM AgID
# che esegue gli stessi comandi Python a 08:00 UTC ogni giorno, scrivendo
# direttamente in /var/www/cruscotto-italia/data/.
#
# Questo workflow esiste come "smoke test" eseguibile su GitHub Actions:
#  - Permette di validare che gli ETL siano sintatticamente eseguibili
#    e che riescano a contattare le fonti dati upstream da un IP esterno
#  - Permette a un revisore (es. AgID) di verificare con un click che la
#    pipeline daily sia funzionante senza dover accedere alla VM
#  - Funge da fallback di emergenza: in caso il cron VM sia fermo, un
#    operatore puo' triggerare manualmente questo workflow per produrre
#    un test report
#
# Differenze rispetto al cron VM produttivo:
#  - Output scritto in /tmp/etl-smoke/ del runner (NON in /var/www/...)
#  - Niente notify del Worker MCP (non e' produzione)
#  - Schedule NON impostato (solo workflow_dispatch manuale)
#
# Cadenza upstream delle 2 sorgenti (riferimento operativo):
#  - PUN (GSE/MASE): file infrastrutture.csv rigenerato ~03:00 UTC.
#    L'ETL include skip automatico via HEAD LastModified persistito in
#    pun/_meta.json (se la fonte non e' cambiata termina in ~1s senza
#    scaricare).
#  - Carburanti (MIMIT Osservatorio Prezzi): anagrafica + prezzi
#    rigenerati ~06:45-06:51 UTC. L'ETL include skip via hash SHA-256
#    combinato persistito in carburanti/_meta.json.
#
# Cadenza cron VM produttiva: 0 8 * * * (ogni giorno alle 08:00 UTC,
# = 09:00/10:00 ora Roma DST), ~70 min dopo pubblicazione MIMIT.

on:
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated list (pun,carburanti,dashboard) or "all"'
        required: false
        default: 'all'
      force:
        description: "Forza esecuzione anche se la sorgente non e' cambiata"
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  pun:
    name: ETL · PUN (smoke test)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'pun') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 30
    outputs:
      ran: ${{ steps.pun_run.outputs.ran }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Compute --force flag
        id: force
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "flag=--force" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run PUN ETL (output in /tmp/etl-smoke/)
        id: pun_run
        env:
          # local_lookup.load_meta/save_meta usano DATA_DIR per leggere/scrivere
          # pun/_meta.json (skip detection). Sul runner /var/www/... non esiste.
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke/pun
          python -m etl.sources.pun --outdir=/tmp/etl-smoke/pun ${{ steps.force.outputs.flag }} \
            2>&1 | tee /tmp/pun-etl.log
          if grep -q "pun_skip" /tmp/pun-etl.log; then
            echo "ran=false" >> $GITHUB_OUTPUT
            echo "PUN skipped: LastModified invariato."
          else
            echo "ran=true" >> $GITHUB_OUTPUT
            echo "PUN executed. Shard prodotti in /tmp/etl-smoke/pun/:"
            ls /tmp/etl-smoke/pun/ | head -5
            echo "Totale shard: $(ls /tmp/etl-smoke/pun/*.json 2>/dev/null | wc -l)"
          fi

  # ---------------------------------------------------------------------------
  carburanti:
    name: ETL · Carburanti (smoke test)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'carburanti') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 30
    outputs:
      ran: ${{ steps.carburanti_run.outputs.ran }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Compute --force flag
        id: force
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "flag=--force" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run Carburanti ETL (output in /tmp/etl-smoke/)
        id: carburanti_run
        env:
          # local_lookup.load_meta/save_meta usano DATA_DIR per leggere/scrivere
          # carburanti/_meta.json (skip detection). Sul runner /var/www/... non esiste.
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke/carburanti
          python -m etl.sources.carburanti --outdir=/tmp/etl-smoke/carburanti ${{ steps.force.outputs.flag }} \
            2>&1 | tee /tmp/carburanti-etl.log
          if grep -q "carburanti_skip" /tmp/carburanti-etl.log; then
            echo "ran=false" >> $GITHUB_OUTPUT
            echo "Carburanti skipped: hash CSV invariato."
          else
            echo "ran=true" >> $GITHUB_OUTPUT
            echo "Carburanti executed. Shard prodotti in /tmp/etl-smoke/carburanti/:"
            ls /tmp/etl-smoke/carburanti/ | head -5
            echo "Totale shard: $(ls /tmp/etl-smoke/carburanti/*.json 2>/dev/null | wc -l)"
          fi

  # ---------------------------------------------------------------------------
  # NOTA dashboard: nel cron VM produttivo il dashboard.py aggrega 16 source.
  # Qui in smoke test l'aggregazione e' parziale (solo i 2 source che girano
  # in questo workflow: pun + carburanti). Resto degli shard del runner sono
  # assenti (l'ETL singoli sono in altri workflow). Quindi il dashboard
  # potrebbe loggare warning su sezioni mancanti: e' atteso, NON e' un bug.
  dashboard:
    name: ETL · Dashboard rebuild (smoke test parziale)
    runs-on: ubuntu-latest
    needs: [pun, carburanti]
    if: ${{ always() && (needs.pun.outputs.ran == 'true' || needs.carburanti.outputs.ran == 'true') && (contains(github.event.inputs.sources, 'dashboard') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '') }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Run Dashboard ETL (smoke test parziale)
        env:
          # local_lookup.get_data_dir() legge questa env per risolvere i
          # source <DATA_DIR>/<source>/<istat>.json (es. pun, carburanti).
          # Path /var/www/... su runner GitHub-hosted non esiste.
          DATA_DIR: /tmp/etl-smoke
        run: |
          mkdir -p /tmp/etl-smoke/dashboard /tmp/etl-smoke/lookup
          # Pre-step: serve anagrafica per produrre lookup/comuni-bundle.json
          # (dashboard.py lo richiede via local_lookup).
          python -m etl.sources.anagrafica --outdir=/tmp/etl-smoke 2>&1 \
            | tail -10
          # Run dashboard (limit 50 comuni: smoke test puro, non production)
          python -m etl.sources.dashboard --outdir=/tmp/etl-smoke/dashboard --limit=50 \
            2>&1 | tee /tmp/dashboard.log | tail -30
          echo ""
          echo "=== Dashboard shard prodotti (smoke, limit 50) ==="
          ls /tmp/etl-smoke/dashboard/*.json 2>/dev/null | wc -l
