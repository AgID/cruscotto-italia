name: ETL · Weekly (smoke test)

# IMPORTANTE — LEGGERE PRIMA DI TRIGGERARE
# =========================================
# Questo workflow NON e' il produttore reale dei dati weekly in produzione.
# Il produttore reale e' il cron `/etc/cron.d/cruscotto-etl` sulla VM AgID
# che esegue gli stessi comandi Python ogni lunedi' a 04:00 UTC, scrivendo
# direttamente in /var/www/cruscotto-italia/data/.
#
# I dati che il sito www.cruscotto-italia.dati.gov.it e il Worker MCP
# servono in produzione sono SEMPRE quelli prodotti dal cron VM, non da
# questo workflow GitHub Actions.
#
# Perche' allora esiste questo workflow?
# --------------------------------------
# E' un "fallback documentale": un revisore (es. AgID) puo' aprirlo dalla
# UI Actions e leggere i comandi Python che il cron VM esegue. Inoltre,
# in caso futuro di sblocco WAF (vedi sotto), puo' essere riattivato
# come producer secondario.
#
# Perche' i job qui sotto attualmente FALLISCONO su ubuntu-latest
# ---------------------------------------------------------------
# Tutte le fonti istituzionali italiane oggetto degli ETL weekly sono
# protette da WAF (F5 Volterra, Akamai, ecc.) che restituiscono HTTP 403
# Forbidden per richieste provenienti da IP cloud-hosted (Microsoft Azure
# subnet, dove GitHub Actions ubuntu-latest gira).
#
# Diagnostica eseguita 2026-05-17:
#  - ANAC OCDS (https://dati.anticorruzione.it/) -> 403 da Azure
#  - PNRR Italia Domani (https://italiadomani.gov.it/) -> 403 da Azure
#  - Sanita' MdS (https://dati.salute.gov.it/) -> 403 da Azure
#  - RUNTS (https://servizi.lavoro.gov.it/) -> 403 da Azure
#
# Le stesse URL ritornano HTTP 200 + dati validi quando interrogate da IP
# italiano (Aruba/VM AgID). Per questo motivo gli ETL girano dalla VM, mai
# da Actions cloud-hosted.
#
# Validazione freshness dati in produzione
# ----------------------------------------
# Per verificare che il cron VM stia effettivamente aggiornando i dati,
# non usare questo workflow. Usare invece:
#
#   curl -s -X POST "https://cruscotto-italia-mcp.agid.workers.dev/mcp" \
#     -H "Content-Type: application/json" \
#     -d '{"jsonrpc":"2.0","method":"tools/call","id":1,
#          "params":{"name":"comune_dashboard",
#                    "arguments":{"istat_code":"075035"}}}' \
#     | jq '.result.content[0].text | fromjson | {_generated_at, _missing}'
#
# Il campo `_generated_at` deve essere recente (< 8 giorni dal momento
# del controllo) e `_missing` deve essere vuoto o quasi.
#
# Log produttivi
# --------------
# I log del cron VM sono in /var/log/cruscotto-etl/<source>-YYYYMMDD.log
# sull'host di produzione.

on:
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated list (anac,pnrr,sanita_mds,runts,dashboard) or "all"'
        required: false
        default: 'all'
      anac_years:
        description: 'ANAC: comma-separated years (default: current year)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # ANAC OCDS - contratti pubblici
  # ATTESO FALLIMENTO HTTP 403 su ubuntu-latest (WAF F5 Volterra cloud-restrict)
  anac:
    name: ETL · ANAC OCDS (atteso fail su Azure)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'anac') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Compute target years
        id: years
        run: |
          if [ -n "${{ github.event.inputs.anac_years }}" ]; then
            echo "value=${{ github.event.inputs.anac_years }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(date -u +%Y)" >> $GITHUB_OUTPUT
          fi
      - name: Show runner public IP (Azure subnet, atteso WAF block)
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run ANAC ETL (atteso HTTP 403 da WAF F5 Volterra)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke
          python -m etl.sources.anac --outdir=/tmp/etl-smoke --years=${{ steps.years.outputs.value }} 2>&1 | tee /tmp/anac-etl.log | tail -30

  # ---------------------------------------------------------------------------
  # PNRR Italia Domani - sistema ReGiS
  # ATTESO FALLIMENTO HTTP 403 (stesso WAF cloud-restrict)
  pnrr:
    name: ETL · PNRR Italia Domani (atteso fail su Azure)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'pnrr') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run PNRR ETL (atteso HTTP 403)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke
          python -m etl.sources.pnrr_progetti --outdir=/tmp/etl-smoke 2>&1 | tee /tmp/pnrr-etl.log | tail -30

  # ---------------------------------------------------------------------------
  # Sanita' MdS - farmacie/parafarmacie/ospedali
  # ATTESO FALLIMENTO HTTP 403 (stesso WAF cloud-restrict)
  sanita_mds:
    name: ETL · Sanita' MdS (atteso fail su Azure)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'sanita_mds') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run Sanita' MdS ETL (atteso HTTP 403)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke/sanita_mds
          python -m etl.sources.sanita_mds --outdir=/tmp/etl-smoke/sanita_mds 2>&1 | tee /tmp/sanita-etl.log | tail -30

  # ---------------------------------------------------------------------------
  # RUNTS - Registro Terzo Settore
  # ATTESO FALLIMENTO HTTP 403 (stesso WAF cloud-restrict)
  runts:
    name: ETL · RUNTS (atteso fail su Azure)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'runts') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run RUNTS ETL (atteso HTTP 403)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke/runts
          python -m etl.sources.runts --outdir=/tmp/etl-smoke/runts 2>&1 | tee /tmp/runts-etl.log | tail -30
