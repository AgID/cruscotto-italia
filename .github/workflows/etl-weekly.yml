name: ETL · Weekly (smoke test)

# IMPORTANTE
# ==========
# Questo workflow NON e' il produttore reale dei dati weekly in produzione.
# Il produttore reale e' il cron `/etc/cron.d/cruscotto-etl` sulla VM AgID
# che esegue gli stessi comandi Python ogni lunedi' a 04:00 UTC, scrivendo
# direttamente in /var/www/cruscotto-italia/data/.
#
# Questo workflow esiste come "smoke test" eseguibile su GitHub Actions:
#  - Permette di validare che gli ETL siano sintatticamente eseguibili
#    e che riescano a contattare le fonti dati upstream da un IP esterno
#  - Permette a un revisore (es. AgID) di verificare con un click che la
#    pipeline weekly sia funzionante senza dover accedere alla VM
#  - Funge da fallback di emergenza: in caso il cron VM sia fermo, un
#    operatore puo' triggerare manualmente questo workflow per produrre
#    un test report
#
# Differenze rispetto al cron VM produttivo:
#  - Output scritto in /tmp/etl-smoke/ del runner (NON in /var/www/...)
#  - Niente notify del Worker MCP (non e' produzione)
#  - Schedule NON impostato (solo workflow_dispatch manuale)
#  - ANAC limitato all'anno corrente (parametro anac_years override)
#  - sanita_mds: senza --no-cache (cache HTTP attiva per smoke test rapido)
#
# Fonti coperte:
#  - ANAC OCDS (contratti pubblici)
#  - PNRR Italia Domani (ReGiS CSV)
#  - Sanita' territoriale Min. Salute (farmacie/parafarmacie/ospedali)
#  - RUNTS Min. Lavoro (Terzo Settore, XLSX bulk via PostBack)
#  - Dashboard: rebuild parziale (limit 50 comuni) a valle dei 4 source

on:
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated list (anac,pnrr,sanita_mds,runts,dashboard) or "all"'
        required: false
        default: 'all'
      anac_years:
        description: 'ANAC: comma-separated years (default: current year)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # ANAC OCDS — NOT smoke-tested on ubuntu-latest
  # =============================================
  # L'ETL anac.py NON puo' essere eseguito da GitHub Actions runner ubuntu-latest
  # perche' il bucket bulk OCDS di ANAC (https://dati.anticorruzione.it/) e'
  # protetto da WAF F5 Volterra (header `server: volt-adc`) che restituisce
  # HTTP 403 secco per richieste provenienti da IP cloud Microsoft Azure
  # (subnet di GitHub Actions hosted runners).
  #
  # Diagnostica (eseguita 2026-05-17):
  #  - Da IP italiano Aruba/AgID con UA Chrome: HTTP 200, JSON OCDS reale
  #  - Da IP Azure GitHub Actions con UA Chrome: HTTP 403 Forbidden
  #  - UA non e' il discriminante; Volterra discrimina per ASN dell'IP sorgente
  #
  # L'ETL anac.py gira normalmente dal cron /etc/cron.d/cruscotto-etl sulla
  # VM AgID (ogni lunedi' 04:00 UTC). I dati pubblicati in produzione sono
  # sempre quelli prodotti dal cron VM, non da questo workflow.
  #
  # Per audit, lo smoke test ANAC su Actions e' sostituito da un FRESHNESS
  # CHECK del file aggregato gia' pubblicato in produzione: si verifica che
  # https://cruscotto-italia.dati.gov.it/data/lookup/anac-aggregato.json sia
  # accessibile e con Last-Modified entro 14 giorni (= cron weekly ha girato
  # almeno una volta nelle ultime 2 settimane).
  #
  # Idem si applica a ogni futura fonte istituzionale dietro WAF cloud-restrict.
  anac:
    name: ETL · ANAC OCDS (freshness check)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'anac') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 5
    steps:
      - name: Freshness check anac-aggregato.json (produzione)
        run: |
          set -e
          URL="https://cruscotto-italia.piersoftckan.biz/data/lookup/anac-aggregato.json"
          echo "Checking freshness of $URL"
          echo "(URL puntera' a cruscotto-italia.dati.gov.it dopo cutover 19/05)"
          echo ""
          # Header check (HEAD request)
          HEADERS=$(curl -sI -L -m 30 "$URL" || true)
          if [ -z "$HEADERS" ]; then
            echo "ERROR: nessuna risposta dal server. Pipeline cron VM potenzialmente ferma."
            exit 1
          fi
          echo "$HEADERS"
          # Estrai HTTP status
          STATUS=$(echo "$HEADERS" | grep -E "^HTTP/" | tail -1 | awk '{print $2}')
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: HTTP $STATUS (atteso 200). File non disponibile."
            exit 1
          fi
          # Estrai Last-Modified e calcola eta'
          LM=$(echo "$HEADERS" | grep -i "^last-modified:" | sed 's/^[Ll]ast-[Mm]odified: //' | tr -d '\r\n')
          if [ -z "$LM" ]; then
            echo "WARN: Last-Modified header assente, skipping age check."
            echo "Freshness check superficiale: HTTP 200 OK ricevuto."
            exit 0
          fi
          echo ""
          echo "Last-Modified: $LM"
          # Calcola differenza in giorni
          NOW_TS=$(date -u +%s)
          LM_TS=$(date -d "$LM" +%s 2>/dev/null || echo 0)
          if [ "$LM_TS" -eq 0 ]; then
            echo "WARN: impossibile parsare Last-Modified. Skip age check."
            exit 0
          fi
          AGE_DAYS=$(( (NOW_TS - LM_TS) / 86400 ))
          echo "Eta' file: $AGE_DAYS giorni"
          if [ "$AGE_DAYS" -gt 14 ]; then
            echo "ERROR: file ANAC piu' vecchio di 14 giorni. Cron VM weekly probabilmente fermo."
            exit 1
          fi
          echo "OK: dati ANAC freschi (eta' $AGE_DAYS gg <= 14gg threshold)."


  # ---------------------------------------------------------------------------
  pnrr:
    name: ETL · PNRR (smoke test)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'pnrr') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run PNRR ETL (output in /tmp/etl-smoke/)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          # PNRR pattern: --outdir e' il PARENT (scrive in <outdir>/pnrr/).
          mkdir -p /tmp/etl-smoke
          python -m etl.sources.pnrr_progetti --outdir=/tmp/etl-smoke 2>&1 | tee /tmp/pnrr-etl.log | tail -30
          echo ""
          echo "=== PNRR shard prodotti ==="
          shopt -s nullglob
          files=(/tmp/etl-smoke/pnrr/*.json)
          shopt -u nullglob
          printf '%s\n' "${files[@]:0:5}"
          echo "Totale shard: ${#files[@]}"

  # ---------------------------------------------------------------------------
  sanita_mds:
    name: ETL · Sanita' MdS (smoke test)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'sanita_mds') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run Sanita' MdS ETL (output in /tmp/etl-smoke/)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke/sanita_mds
          python -m etl.sources.sanita_mds --outdir=/tmp/etl-smoke/sanita_mds 2>&1 | tee /tmp/sanita-etl.log | tail -30
          echo ""
          echo "=== Sanita' MdS shard prodotti ==="
          shopt -s nullglob
          files=(/tmp/etl-smoke/sanita_mds/*.json)
          shopt -u nullglob
          printf '%s\n' "${files[@]:0:5}"
          echo "Totale shard: ${#files[@]}"

  # ---------------------------------------------------------------------------
  runts:
    name: ETL · RUNTS (smoke test)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'runts') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run RUNTS ETL (output in /tmp/etl-smoke/)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke/runts
          python -m etl.sources.runts --outdir=/tmp/etl-smoke/runts 2>&1 | tee /tmp/runts-etl.log | tail -30
          echo ""
          echo "=== RUNTS shard prodotti ==="
          shopt -s nullglob
          files=(/tmp/etl-smoke/runts/*.json)
          shopt -u nullglob
          printf '%s\n' "${files[@]:0:5}"
          echo "Totale shard: ${#files[@]}"

  # ---------------------------------------------------------------------------
  # NOTA dashboard: nel cron VM produttivo aggrega 16 source. Qui in smoke
  # test l'aggregazione e' parziale (solo i 4 source weekly: anac, pnrr,
  # sanita_mds, runts). Resto degli shard del runner sono assenti.
  # Quindi il dashboard logghera' warning su sezioni mancanti: e' atteso.
  dashboard:
    name: ETL · Dashboard rebuild (smoke test parziale)
    runs-on: ubuntu-latest
    needs: [anac, pnrr, sanita_mds, runts]
    if: ${{ always() && (needs.anac.result == 'success' || needs.pnrr.result == 'success' || needs.sanita_mds.result == 'success' || needs.runts.result == 'success') && (contains(github.event.inputs.sources, 'dashboard') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '') }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Run Dashboard ETL (smoke test parziale)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          mkdir -p /tmp/etl-smoke/dashboard /tmp/etl-smoke/lookup
          # Pre-step: anagrafica produce lookup/comuni-bundle.json
          # (dashboard.py lo richiede via local_lookup).
          python -m etl.sources.anagrafica --outdir=/tmp/etl-smoke 2>&1 | tail -10
          # Run dashboard (limit 50 comuni: smoke test puro, non production)
          python -m etl.sources.dashboard --outdir=/tmp/etl-smoke/dashboard --limit=50 \
            2>&1 | tee /tmp/dashboard.log | tail -30
          echo ""
          echo "=== Dashboard shard prodotti (smoke, limit 50) ==="
          shopt -s nullglob
          files=(/tmp/etl-smoke/dashboard/*.json)
          shopt -u nullglob
          echo "Totale: ${#files[@]}"
