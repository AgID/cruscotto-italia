name: ETL · Monthly

# Cadenza mensile per fonti che aggiornano lentamente:
#  - Anagrafica unificata (ISTAT + IPA)
#  - BDAP-MOP (opere pubbliche)
#  - SIOPE Spese (force refresh: --no-cache, scarica nuovi mesi pubblicati)
#  - ANNCSU (Agenzia Entrate + ISTAT, snapshot mensile civici e strade,
#    --full-shards genera anche shard pesanti su anncsu_full/)
#  - AGCOM Broadband Map (BBmap, copertura banda larga ex art. 22 CCE):
#    rilascio AGCOM è trimestrale (~30-45 gg dopo fine trimestre), ma
#    l'ETL fa skip-by-sha incrementale: nei mesi senza nuovo rilascio
#    il job termina in <30s con `agcom_skip reason=sha_unchanged`.
#
# Al termine, ricostruisce dashboard/<istat>.json.
#
# Cron: 5° giorno di ogni mese alle 04:00 UTC = 05:00/06:00 ora di Roma (DST).

on:
  # Schedule rimosso: ETL monthly girano via cron VM AgID (vedi deploy/cron/cruscotto-etl).
  # GitHub Actions resta come fallback emergenza, attivabile manualmente dalla UI.
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated list (anagrafica,bdap,siope,anncsu,sanita_mds_refresh,agcom_bbmap,dashboard) or "all"'
        required: false
        default: 'all'
      siope_no_cache:
        description: "SIOPE: force re-download (no-cache). Default true sul cron, false su run manuale."
        required: false
        default: 'false'

# NOTE 2026-05-17: env R2_* rimosse dopo refactor ETL local-first.
# Cruscotto Italia AgID non usa piu' Cloudflare R2 (account AgID non puo'
# crearne). Tutti gli ETL girano --target=local scrivendo direttamente su
# /var/www/cruscotto-italia/data/ del runner self-hosted Aruba/VM AgID.
# I secrets GitHub R2_* possono essere rimossi nell'Ondata 2 (post-cutover).

jobs:
  # ---------------------------------------------------------------------------
  anagrafica:
    name: ETL · Anagrafica unificata (ISTAT + IPA)
    runs-on: [self-hosted, linux, aruba]
    if: ${{ github.event_name == 'schedule' || contains(github.event.inputs.sources, 'anagrafica') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Run anagrafica ETL
        run: python -m etl.sources.anagrafica --target=local

  # ---------------------------------------------------------------------------
  bdap:
    name: ETL · BDAP-MOP (opere pubbliche)
    runs-on: [self-hosted, linux, aruba]
    if: ${{ github.event_name == 'schedule' || contains(github.event.inputs.sources, 'bdap') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Run BDAP-MOP ETL
        run: python -m etl.sources.bdap --target=local

  # ---------------------------------------------------------------------------
  siope:
    name: ETL · SIOPE Spese (bulk CKAN, force refresh)
    runs-on: [self-hosted, linux, aruba]
    if: ${{ github.event_name == 'schedule' || contains(github.event.inputs.sources, 'siope') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Compute --no-cache flag
        id: nocache
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.siope_no_cache }}" = "true" ]; then
            echo "flag=--no-cache" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi
      - name: Run SIOPE ETL
        run: python -m etl.sources.siope --target=local --anni=2026 ${{ steps.nocache.outputs.flag }}

  # ---------------------------------------------------------------------------
  anncsu:
    name: ETL · ANNCSU (civici e strade certificate)
    runs-on: [self-hosted, linux, aruba]
    if: ${{ github.event_name == 'schedule' || contains(github.event.inputs.sources, 'anncsu') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Run ANNCSU ETL (sample shard 1000 punti)
        # Cron: scarica snapshot fresco da agenziaentrate.gov.it (no cache).
        # Genera shard sample anncsu/<istat>.json + push R2.
        run: python -m etl.sources.anncsu --target=local
      - name: Run ANNCSU ETL (full shard, tutti i civici)
        # Riusa cache locale appena scaricata, solo build+push shard pesanti
        # su prefisso R2 anncsu_full/. Esposti via Worker
        # GET /data/anncsu_full/<istat>.json
        run: python -m etl.sources.anncsu --target=local --skip-download --skip-sample --full-shards

  # ---------------------------------------------------------------------------
  # Sanita' refresh DOPO ANNCSU: il geocoding ANNCSU di farmacie/parafarm.
  # con coord MdS errate o mancanti migliora ad ogni aggiornamento ANNCSU.
  # Senza questo job, dovremmo aspettare il lunedi' successivo (etl-weekly.yml)
  # per beneficiare dei nuovi civici. Con questo job, sanita_mds gira subito
  # dopo anncsu e propaga gli shard arricchiti al dashboard.
  sanita_mds_refresh:
    name: ETL · Sanita' refresh (geocoding ANNCSU appena aggiornato)
    runs-on: [self-hosted, linux, aruba]
    needs: [anncsu]
    if: ${{ always() && needs.anncsu.result == 'success' && (github.event_name == 'schedule' || contains(github.event.inputs.sources, 'sanita_mds_refresh') || contains(github.event.inputs.sources, 'anncsu') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '') }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Run sanita_mds (riusa cache CSV MdS, geocoda con ANNCSU fresco)
        # --no-cache no: i CSV MdS sono giornalieri, non serve riscaricarli ogni volta.
        # Il geocoder ANNCSU dentro l'ETL legge automaticamente lo shard fresco
        # da R2 (appena pushato dal job anncsu).
        run: python -m etl.sources.sanita_mds --target=local --force-shard-upload

  # ---------------------------------------------------------------------------
  # AGCOM Broadband Map (BBmap): copertura banda larga FTTH/FTTC per comune,
  # ex art. 22 Codice Comunicazioni Elettroniche. Rilascio AGCOM è trimestrale
  # (~30-45 gg dopo fine trimestre), ma l'ETL ha skip-by-sha incrementale su
  # agcom_bbmap/_meta.json: il job gira ogni mese e nei mesi senza nuovo CSV
  # AGCOM termina in <30s con `agcom_skip reason=sha_unchanged`.
  # CSV bulk nazionale (~775 KB), copertura 7896/7896 comuni (100%).
  # Licenza CC BY 4.0 ex art. 52 c.2 D.Lgs 82/2005 (CAD).
  agcom_bbmap:
    name: ETL · AGCOM Broadband Map (copertura banda larga, skip-by-sha)
    runs-on: [self-hosted, linux, aruba]
    if: ${{ github.event_name == 'schedule' || contains(github.event.inputs.sources, 'agcom_bbmap') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Run AGCOM Broadband Map ETL (skip se sha CSV invariato)
        run: python -m etl.sources.agcom_bbmap --target=local

  # ---------------------------------------------------------------------------
  # Dashboard rebuild parte SOLO quando i 5 ETL upstream sono finiti.
  # Sufficiente che almeno UNO sia andato in success (perché il dashboard.py
  # legge tutti gli shard esistenti su R2 e compone — non dipende dal nuovo
  # output di un singolo ETL).
  dashboard:
    name: ETL · Dashboard rebuild (single-fetch shard)
    runs-on: [self-hosted, linux, aruba]
    needs: [anagrafica, bdap, siope, anncsu, sanita_mds_refresh, agcom_bbmap]
    if: ${{ always() && (needs.anagrafica.result == 'success' || needs.bdap.result == 'success' || needs.siope.result == 'success' || needs.anncsu.result == 'success' || needs.sanita_mds_refresh.result == 'success' || needs.agcom_bbmap.result == 'success') }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Run Dashboard ETL
        run: python -m etl.sources.dashboard --target=local

  # ---------------------------------------------------------------------------
  notify:
    name: Notify worker (cache purge)
    needs: [dashboard]
    if: ${{ always() && needs.dashboard.result == 'success' }}
    runs-on: [self-hosted, linux, aruba]
    steps:
      - name: Purge worker cache
        run: |
          curl -sS -X POST "https://cruscotto-italia-mcp.agid.workers.dev/admin/cache/purge" \
            -H "Authorization: Bearer ${{ secrets.WORKER_ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
          || echo "Cache purge endpoint non disponibile (non-critical)"
