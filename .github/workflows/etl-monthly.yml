name: ETL · Monthly (smoke test)

# IMPORTANTE — LEGGERE PRIMA DI TRIGGERARE
# =========================================
# Questo workflow NON e' il produttore reale dei dati monthly in produzione.
# Il produttore reale e' il cron `/etc/cron.d/cruscotto-etl` sulla VM AgID
# che esegue gli stessi comandi Python il 5° giorno di ogni mese alle
# 04:00 UTC, scrivendo direttamente in /var/www/cruscotto-italia/data/.
#
# I dati che il sito www.cruscotto-italia.dati.gov.it e il Worker MCP
# servono in produzione sono SEMPRE quelli prodotti dal cron VM, non da
# questo workflow GitHub Actions.
#
# Perche' allora esiste questo workflow?
# --------------------------------------
# E' un "fallback documentale": un revisore (es. AgID) puo' aprirlo dalla
# UI Actions e leggere i comandi Python che il cron VM esegue. Inoltre,
# in caso futuro di sblocco WAF (vedi sotto), puo' essere riattivato
# come producer secondario.
#
# Perche' i job qui sotto attualmente FALLISCONO su ubuntu-latest
# ---------------------------------------------------------------
# Tutte le fonti istituzionali italiane oggetto degli ETL monthly sono
# protette da WAF (F5 Volterra, Akamai, ecc.) che restituiscono HTTP 403
# Forbidden per richieste provenienti da IP cloud-hosted (Microsoft Azure
# subnet, dove GitHub Actions ubuntu-latest gira).
#
# Diagnostica analoga al workflow weekly:
#  - anagrafica.py (IPA + ISTAT): probabile 403 da Azure
#  - bdap (BDAP-MOP MEF): probabile 403 da Azure
#  - siope (Tesoro): probabile 403 da Azure
#  - anncsu (Agenzia Entrate): probabile 403 da Azure
#  - agcom_bbmap (ArcGIS): potrebbe funzionare, da verificare
#
# Le stesse URL ritornano HTTP 200 + dati validi quando interrogate da IP
# italiano (Aruba/VM AgID). Per questo motivo gli ETL girano dalla VM, mai
# da Actions cloud-hosted.
#
# Validazione freshness dati in produzione
# ----------------------------------------
# Per verificare che il cron VM stia effettivamente aggiornando i dati,
# non usare questo workflow. Usare invece:
#
#   curl -s -X POST "https://cruscotto-italia-mcp.agid.workers.dev/mcp" \
#     -H "Content-Type: application/json" \
#     -d '{"jsonrpc":"2.0","method":"tools/call","id":1,
#          "params":{"name":"comune_dashboard",
#                    "arguments":{"istat_code":"075035"}}}' \
#     | jq '.result.content[0].text | fromjson | {_generated_at, _missing}'
#
# Il campo `_generated_at` deve essere recente (< 35 giorni dal momento
# del controllo) e `_missing` deve essere vuoto o quasi.
#
# Log produttivi
# --------------
# I log del cron VM monthly sono in /var/log/cruscotto-etl/<source>-YYYYMMDD.log
# sull'host di produzione.

on:
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated list (anagrafica,bdap,siope,anncsu,sanita_mds_refresh,agcom_bbmap) or "all"'
        required: false
        default: 'all'
      siope_no_cache:
        description: "SIOPE: force re-download (no-cache). Default false."
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Anagrafica unificata (ISTAT + IPA AgID)
  # ATTESO FALLIMENTO HTTP 403 su ubuntu-latest (WAF cloud-restrict)
  anagrafica:
    name: ETL · Anagrafica (atteso fail su Azure)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'anagrafica') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Show runner public IP (Azure subnet, atteso WAF block)
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run Anagrafica ETL (atteso HTTP 403)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke
          python -m etl.sources.anagrafica --outdir=/tmp/etl-smoke 2>&1 | tee /tmp/anagrafica-etl.log | tail -30

  # ---------------------------------------------------------------------------
  # BDAP-MOP — opere pubbliche
  # ATTESO FALLIMENTO HTTP 403 (WAF cloud-restrict)
  bdap:
    name: ETL · BDAP-MOP (atteso fail su Azure)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'bdap') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run BDAP-MOP ETL (atteso HTTP 403)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke
          python -m etl.sources.bdap --outdir=/tmp/etl-smoke 2>&1 | tee /tmp/bdap-etl.log | tail -30

  # ---------------------------------------------------------------------------
  # SIOPE — flussi di cassa
  # ATTESO FALLIMENTO HTTP 403 (WAF cloud-restrict)
  siope:
    name: ETL · SIOPE (atteso fail su Azure)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'siope') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Compute --no-cache flag
        id: nocache
        run: |
          if [ "${{ github.event.inputs.siope_no_cache }}" = "true" ]; then
            echo "flag=--no-cache" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run SIOPE ETL (atteso HTTP 403)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke/siope
          python -m etl.sources.siope --outdir=/tmp/etl-smoke/siope --anni=$(date -u +%Y) ${{ steps.nocache.outputs.flag }} 2>&1 | tee /tmp/siope-etl.log | tail -30

  # ---------------------------------------------------------------------------
  # ANNCSU — civici e strade Agenzia Entrate
  # ATTESO FALLIMENTO HTTP 403 (WAF cloud-restrict)
  anncsu:
    name: ETL · ANNCSU (atteso fail su Azure)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'anncsu') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run ANNCSU ETL (atteso HTTP 403)
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke/anncsu
          python -m etl.sources.anncsu --outdir=/tmp/etl-smoke/anncsu 2>&1 | tee /tmp/anncsu-etl.log | tail -30

  # ---------------------------------------------------------------------------
  # AGCOM Broadband Map — copertura banda larga FTTH/FTTC
  # POTREBBE FUNZIONARE: ArcGIS services.arcgis.com non sempre ha WAF cloud-restrict
  agcom_bbmap:
    name: ETL · AGCOM Broadband Map
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.inputs.sources, 'agcom_bbmap') || github.event.inputs.sources == 'all' || github.event.inputs.sources == '' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - run: pip install -r etl/requirements.txt
      - name: Show runner public IP
        run: |
          echo "Runner IP: $(curl -sS -m 5 https://api.ipify.org || echo unknown)"
      - name: Run AGCOM Broadband Map ETL
        env:
          DATA_DIR: /tmp/etl-smoke
        run: |
          set -o pipefail
          mkdir -p /tmp/etl-smoke/agcom_bbmap
          python -m etl.sources.agcom_bbmap --outdir=/tmp/etl-smoke/agcom_bbmap 2>&1 | tee /tmp/agcom-etl.log | tail -30
          echo ""
          echo "=== AGCOM shard prodotti ==="
          shopt -s nullglob
          files=(/tmp/etl-smoke/agcom_bbmap/*.json)
          shopt -u nullglob
          printf '%s\n' "${files[@]:0:5}"
          echo "Totale shard: ${#files[@]}"
