name: CI · lint & test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  worker:
    name: Worker (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test --if-present

  etl:
    name: ETL (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements*.txt
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint with ruff
        run: ruff check .
      - name: Type check with mypy
        run: mypy --ignore-missing-imports . || true   # non-blocking initially
      - name: Run tests
        run: pytest -v --cov ../tests/etl || echo "no tests yet"
