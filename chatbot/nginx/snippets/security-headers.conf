# Security headers comuni a Cruscotto Italia
# Aggiornato durante VA AgID 19-20/05/2026 (cleanup CSP F2)
# 
# Applicare con `include snippets/security-headers.conf;` sia a livello server
# sia dentro ogni location block che usa add_header.
# 
# NOTA TECNICA: nginx eredita add_header solo se NESSUN add_header e' presente
# nel location corrente; quindi se un location usa add_header per qualunque
# scopo, deve re-includere questo snippet per non perdere gli header di sicurezza.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "no-referrer" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

# Content-Security-Policy
# - connect-src: solo endpoint MCP attivi (post-cleanup F2, rimossi 2 endpoint obsoleti)
# - script-src: 'unsafe-inline' necessario per inline JS in comune.html (vendor SHA-384 protected)
# - img-src: data: per icone, tile.openstreetmap.org per mappe Leaflet
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://cruscotto-italia-mcp.dati.gov.it https://cruscotto-italia-mcp.agid.workers.dev; img-src 'self' data: https://*.tile.openstreetmap.org; object-src 'none'; frame-ancestors 'self';" always;
