# /etc/nginx/conf.d/cruscotto-italia.dati.gov.it.conf
#
# Frontend Cruscotto Italia su VM AgID FastWeb.
# Architettura B1:
#   - Sito statico (HTML/CSS/JS)        → /var/www/cruscotto-italia/frontend/
#   - Dati MCP (whitelist sub-folder)   → /var/www/cruscotto-italia/data/
#   - Statistiche private htpasswd      → /var/www/cruscotto-stats/
#
# Note di sicurezza:
# - Anti-scanner / anti-backup rules ereditate da config Aruba.
# - /data/ espone SOLO ciò che il Worker MCP usa pubblicamente:
#     dashboard/, anncsu_full/, bdap/dettaglio/, skills/, manifest.json,
#     istat-coords.json,
#     lookup/*.json (comuni-bundle, comuni-index, anac-aggregato, bdap-aggregato).
#   Tutto il resto (anac/monthly/, anagrafica/, raw/, _work/, bdap/* eccetto
#   dettaglio/, ecc.) NON e' servito.
#   I file .parquet sotto lookup/ sono bloccati esplicitamente: il Worker MCP usa
#   solo i .json.
#
# Cert SSL: gestito separatamente (ticket provider AgID per dati.gov.it).
# Una volta installati i cert in /etc/letsencrypt o /etc/ssl/dati.gov.it/,
# scommentare le righe ssl_certificate corrispondenti.

server {
    # gzip per /data/*.geojson (47MB -> ~3MB)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types application/json application/geo+json application/octet-stream text/css text/javascript application/javascript application/xml text/xml svg+xml;
    server_name cruscotto-italia.dati.gov.it;
    root /var/www/cruscotto-italia/frontend;
    index index.html;

    # CERT-AgID-VA-02 #7: solo GET/HEAD/POST; blocca PUT/DELETE/PATCH/CONNECT/TRACE/OPTIONS
    if ($request_method !~ ^(GET|HEAD|POST)$) { return 405; }

    # Log dedicati per vhost (separazione da chatbot SIMBA che condivide la VM)
    access_log /var/log/nginx/cruscotto-italia.access.log main_sn;
    error_log  /var/log/nginx/cruscotto-italia.error.log;

    # ─── Difese anti-attacco ──────────────────────────────────────────────
    #location ~* \.(bak|backup|swp|swo|orig|old|tmp|~)$ {
    location ~* \.(bak|backup|swp|swo|orig|old|~)$|[^/]\.tmp$ {
        set $service "block-backup";
        deny all;
        return 404;
    }

    location ~* /(\.env|\.git/|\.aws/|\.ssh/|\.DS_Store|\.htaccess|\.htpasswd|wp-admin|wp-login|wp-content|wp-includes|wordpress/|phpmyadmin|pma/|adminer|boaform|HNAP1|cgi-bin|fckeditor|tinymce|phpunit|jenkins/|gitlab/|actuator/|jolokia/|webdav/|admin/|administrator/|api/|server-status|server-info|backup\.|dump\.|database\.|web\.config|\.well-known/(?!security\.txt)) {
        set $service "block-scanner";
        return 404;
    }

    include /etc/nginx/snippets/security-headers.conf;

    # ─── Dati MCP whitelisted ─────────────────────────────────────────────
    # Il Worker AgID (cruscotto-italia-mcp.dati.gov.it) fetcha questi path
    # via HTTPS pubblico. Solo whitelist, non l'intero /data/.

    location ^~ /data/dashboard/ {
        set $service "data-dashboard";
        alias /var/www/cruscotto-italia/data/dashboard/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location ^~ /data/anncsu_full/ {
        set $service "data-anncsu-full";
        alias /var/www/cruscotto-italia/data/anncsu_full/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
    location ^~ /data/catasto_full/ {
        set $service "data-catasto-full";
        alias /var/www/cruscotto-italia/data/catasto_full/;
        gzip_static always;
        gzip_vary on;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    # Beni Culturali MiC ArCo + Cultural-ON (FULL) - lazy fetch per comuni
    # con piu' di 30 beni (~770 comuni, Roma 888, Napoli 1177, Lecce 654).
    # Snapshot mensile immutabile -> cache 24h.
    location ^~ /data/beni_culturali_full/ {
        set $service "data-beni-culturali-full";
        alias /var/www/cruscotto-italia/data/beni_culturali_full/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Censimento ISTAT 2021 - Basi territoriali (Geometrie sezioni di censimento).
    # Lazy fetch dal frontend on tab open. Size 30KB-3MB per comune.
    # Snapshot annuali immutabili -> cache 24h aggressiva.
    location ^~ /data/censimento_full/ {
        set $service "data-censimento-full";
        alias /var/www/cruscotto-italia/data/censimento_full/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        # Forza MIME standard per GeoJSON (RFC 7946).
        types {
            application/geo+json geojson;
        }
        default_type application/geo+json;
        location ~* \.geojson$ {
            try_files $uri =404;
        }
        try_files $uri =404;
    }

    # Censimento ISTAT 2021 - Aggregati comune-level (KPI + distribuzioni).
    # Letti dal dashboard.py per la sezione 'censimento' del comune A1.
    # Shard standalone ~3-5KB. Cache 1h (refresh rapido su re-run ETL).
    location ^~ /data/censimento/ {
        set $service "data-censimento";
        alias /var/www/cruscotto-italia/data/censimento/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        location ~* \.json$ {
            try_files $uri =404;
        }
        try_files $uri =404;
    }

    # BDAP-MOP dettaglio opere pubbliche per comune.
    # Usato dal tool MCP comune_opere_dettaglio (worker/src/tools/comune_opere_dettaglio.ts).
    # Whitelist ESCLUSIVA della subdir bdap/dettaglio/: il blocco /data/bdap/
    # in se' rimane chiuso (catch-all return 404 in fondo) per non esporre i
    # file di aggregazione intermedi.
    location ^~ /data/bdap/dettaglio/ {
        set $service "data-bdap-dettaglio";
        alias /var/www/cruscotto-italia/data/bdap/dettaglio/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location ^~ /data/skills/ {
        set $service "data-skills";
        alias /var/www/cruscotto-italia/data/skills/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location = /data/manifest.json {
        set $service "data-manifest";
        alias /var/www/cruscotto-italia/data/manifest.json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Lookup files letti dal Worker MCP per risolvere nome->ISTAT e per
    # KPI aggregati ANAC/BDAP per codice fiscale buyer. Files:
    #   - comuni-bundle.json   (anagrafica 7896 comuni)
    #   - comuni-index.json    (light index per search_comune)
    #   - anac-aggregato.json  (CF -> KPI contratti ANAC)
    #   - bdap-aggregato.json  (CF -> KPI opere BDAP-MOP)
    # Cache 1h (refresh giornaliero/settimanale via ETL).
    location ^~ /data/lookup/ {
        set $service "data-lookup";
        alias /var/www/cruscotto-italia/data/lookup/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        # Espone solo i .json, blocca .parquet/altri intermedi
        location ~* \.json$ {
            try_files $uri =404;
        }
        location ~* \.parquet$ {
            return 404;
        }
        try_files $uri =404;
    }

    # Aggregati nazionali per source. Match exact (=) ha priorita' massima in
    # nginx: bypassa la catch-all 'location ^~ /data/' che ritorna 404 alla fine
    # del blocco /data/. Aggiungere una nuova location = per ogni nuova source
    # che genera <source>/_nazionale.json letto direttamente dal frontend.
    # Currently: carburanti (chart confronto prezzo locale vs media nazionale).
    location = /data/carburanti/_nazionale.json {
        set $service "data-nazionale-carburanti";
        alias /var/www/cruscotto-italia/data/carburanti/_nazionale.json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
    }

    # Coordinate centroide comuni (per mappa Pendolarismo e altre tab geo)
    # File generato da scripts/build_istat_coords.py (centroide da OSM
    # extent + fallback ANNCSU). Cachato 1 giorno.
    location = /data/istat-coords.json {
        set $service "data-istat-coords";
        alias /var/www/cruscotto-italia/data/istat-coords.json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
    }
    # ---- Dati per-sezione completi (esposti per download pubblico open-data) ----
    # JSON per-comune rigenerati a ogni ETL -> cache 1h (no immutable).
    location ^~ /data/agcom_bbmap/ {
        set $service "data-agcom_bbmap";
        alias /var/www/cruscotto-italia/data/agcom_bbmap/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/anncsu/ {
        set $service "data-anncsu";
        alias /var/www/cruscotto-italia/data/anncsu/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/aria/ {
        set $service "data-aria";
        alias /var/www/cruscotto-italia/data/aria/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/asia/ {
        set $service "data-asia";
        alias /var/www/cruscotto-italia/data/asia/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/beni_culturali/ {
        set $service "data-beni_culturali";
        alias /var/www/cruscotto-italia/data/beni_culturali/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/carburanti/ {
        set $service "data-carburanti";
        alias /var/www/cruscotto-italia/data/carburanti/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/demografia/ {
        set $service "data-demografia";
        alias /var/www/cruscotto-italia/data/demografia/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/immobili_pa/ {
        set $service "data-immobili_pa";
        alias /var/www/cruscotto-italia/data/immobili_pa/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/pendolarismo/ {
        set $service "data-pendolarismo";
        alias /var/www/cruscotto-italia/data/pendolarismo/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/pnrr/ {
        set $service "data-pnrr";
        alias /var/www/cruscotto-italia/data/pnrr/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/profilo/ {
        set $service "data-profilo";
        alias /var/www/cruscotto-italia/data/profilo/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/pun/ {
        set $service "data-pun";
        alias /var/www/cruscotto-italia/data/pun/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/redditi/ {
        set $service "data-redditi";
        alias /var/www/cruscotto-italia/data/redditi/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/runts/ {
        set $service "data-runts";
        alias /var/www/cruscotto-italia/data/runts/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/sanita_mds/ {
        set $service "data-sanita_mds";
        alias /var/www/cruscotto-italia/data/sanita_mds/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/scuole/ {
        set $service "data-scuole";
        alias /var/www/cruscotto-italia/data/scuole/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/siope/ {
        set $service "data-siope";
        alias /var/www/cruscotto-italia/data/siope/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/territorio/ {
        set $service "data-territorio";
        alias /var/www/cruscotto-italia/data/territorio/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/turismo/ {
        set $service "data-turismo";
        alias /var/www/cruscotto-italia/data/turismo/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location ^~ /data/veicoli/ {
        set $service "data-veicoli";
        alias /var/www/cruscotto-italia/data/veicoli/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    # Tutti gli altri /data/... ritornano 404 (anac/, anagrafica/, raw/, etc.
    # sono intermedi/build, non vanno esposti).
    location ^~ /data/ {
        set $service "data-blocked";
        return 404;
    }
    # ─── Lookup nomi ISTAT (frontend) ─────────────────────────────────────
    # File generato dalla pipeline analytics in /var/www/cruscotto-stats/,
    # esposto via alias per il frontend (tab Pendolarismo usa lookup
    # istat_code -> denominazione). Cachato 1 giorno (il file cambia solo
    # quando ISTAT pubblica variazioni territoriali).
    location = /istat-names.json {
        set $service "istat-names";
        alias /var/www/cruscotto-stats/istat-names.json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
    }

    # ─── Statistiche private (htpasswd) ──────────────────────────────────
    # --- Chat Lab (prototipo chatbot AI, basic auth dedicata) ---
    location = /chat-lab { return 301 /chatbot/; }
    location ^~ /chat-lab/ { return 301 /chatbot/; }
    location = /chatbot { return 301 /chatbot/; }
    location ^~ /chatbot/ {
        limit_req zone=chatlab burst=10 nodelay;
        limit_conn chatconn 6;
        limit_conn_status 503;
        client_max_body_size 64k;
        limit_req_status 429;
        auth_basic "Cruscotto Italia - ChatBot";
        auth_basic_user_file /etc/nginx/.htpasswd-chatlab;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data: https://*.beniculturali.it; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        proxy_pass http://127.0.0.1:3011/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location ^~ /stats/ {
        set $service "stats";
        alias /var/www/cruscotto-stats/;
        index index.html;
        auth_basic "Statistiche Cruscotto Italia";
        auth_basic_user_file /etc/nginx/.htpasswd-analytics;
        add_header X-Robots-Tag "noindex, nofollow" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ─── Sito statico ─────────────────────────────────────────────────────
    # CERT-AgID-VA-02 #6: niente listing/301 su dir statiche (info disclosure) -> 404
    location ~ ^/(assets|vendor|css|js|img|fonts)/?$ {
        set $service "dir-block";
        return 404;
    }

    location / {
        set $service "static";
        include /etc/nginx/snippets/security-headers.conf;
        # BLINDATURA-FRONTEND: scommentare le 2 righe sotto per chiudere il sito
        # al pubblico in attesa OK AgID. Le /data/*.json restano pubbliche
        # comunque (Worker MCP deve poter leggere). Scommentare con:
        #   sudo sed -i 's|auth_basic|auth_basic|g' \
        #     /etc/nginx/conf.d/cruscotto-italia.dati.gov.it.conf
        # Riaprire con:
        #   sudo sed -i 's|^\(\s*\)auth_basic |\1auth_basic |g' \
        #     /etc/nginx/conf.d/cruscotto-italia.dati.gov.it.conf
        # poi sudo nginx -t && sudo systemctl reload nginx
        try_files $uri $uri/ /index.html =404;
    }

    location ~ \.html$ {
        set $service "static-html";
        include /etc/nginx/snippets/security-headers.conf;
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        set $service "static-asset";
        include /etc/nginx/snippets/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── TLS ──────────────────────────────────────────────────────────────
    # CERT AgID: aggiornare i path quando i cert sono disponibili sulla VM.
    listen 443 ssl;
    http2 on;
    ssl_certificate     /etc/ssl/dati.gov.it/cruscotto-italia.dati.gov.it.fullchain.pem;
    ssl_certificate_key /etc/ssl/dati.gov.it/cruscotto-italia.dati.gov.it.privkey.pem;

    # Se invece useremo Let's Encrypt:
    # ssl_certificate     /etc/letsencrypt/live/cruscotto-italia.dati.gov.it/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cruscotto-italia.dati.gov.it/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name cruscotto-italia.dati.gov.it;
    return 301 https://$host$request_uri;
}
