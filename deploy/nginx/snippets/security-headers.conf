# Security headers — applicare con `include snippets/security-headers.conf;`
# sia a livello server sia dentro ogni location block che usa add_header.
# Motivo: nginx eredita add_header solo se NESSUN add_header è presente nel
# location corrente; quindi va ripetuto.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "no-referrer" always;

# HSTS: 2 anni, includeSubDomains, preload-ready
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Permissions-Policy: disabilita feature browser non necessarie
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

# CSP: permetti fetch verso il Worker MCP su Cloudflare + tile OSM per Leaflet
# NOTA: 'unsafe-inline' su style/script è necessario per gli inline style/script
# nelle pagine HTML (Chart.js init, ecc.). Rimovibile in futuro con nonce/hash.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://cruscotto-italia-mcp.datigovit.workers.dev https://cruscotto-italia-mcp.piersoftckan.biz https://cruscotto-italia-mcp.agid.workers.dev; img-src 'self' data: https://*.tile.openstreetmap.org; object-src 'none'; frame-ancestors 'self';" always;
