<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vista comune · Cruscotto Italia</title>
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/base.css">

<style>
/* === ALIAS bridge: vecchi nomi -> nuovi token Design Italia === */
:root{
  --paper: var(--bg);
  --paper-2: var(--bg-alt);
  --ink-mute: var(--mute);
  --accent: var(--blu-italia);
  --accent-2: var(--blu-italia-dark);
  --gold: var(--warning);
  --rule: var(--border);
  --serif: var(--font-sans);   /* niente piu' Fraunces, tutto Titillium */
  --sans: var(--font-sans);
  --mono: var(--font-mono);
}

/* === Override Design Italia: niente corsivo nei titoli === */
em, .comune-title em, .section-h em, h1 em, h2 em, h3 em {
  font-style: normal !important;
  color: var(--blu-italia);
  font-weight: inherit;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  line-height:1.5;
  min-height:100vh;
}
a{color:var(--ink);text-decoration:underline;text-underline-offset:3px}
a:hover{color:var(--accent)}
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.skip{position:absolute;left:-9999px}
.skip:focus{position:static}

/* Mini-masthead */
.mini-mast{
  border-bottom:1px solid var(--rule);
  padding:16px 0;
  background:var(--paper);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(8px);
}
.mini-mast .wrap{display:flex;justify-content:space-between;align-items:center;gap:24px}
.mini-brand{
  font-family:var(--serif);
  font-weight:700;
  font-size:18px;
  letter-spacing:-0.02em;
  text-decoration:none;
  color:var(--ink);
}
.mini-brand .it{color:var(--accent);font-style:italic}
.mini-search{
  flex:1;max-width:480px;
  display:flex;
  background:var(--paper-2);
  border:1px solid var(--rule);
}
.mini-search{position:relative;}
.mini-suggestions{
  position:absolute;
  top:calc(100% + 1px);
  left:0;right:0;
  background:var(--paper);
  border:1px solid var(--rule);
  z-index:60;
  max-height:380px;
  overflow-y:auto;
  display:none;
  box-shadow:0 4px 16px rgba(0,0,0,0.08);
}
.mini-suggestions.open{display:block;}
.mini-suggestion{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  padding:10px 14px;
  cursor:pointer;
  border-bottom:1px solid var(--paper-2);
  gap:12px;
}
.mini-suggestion:last-child{border-bottom:none;}
.mini-suggestion:hover, .mini-suggestion.active{background:var(--paper-2);}
.mini-suggestion-name{
  font-family:var(--serif);
  font-size:15px;
  font-weight:500;
  color:var(--ink);
}
.mini-suggestion-meta{
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink-mute);
  letter-spacing:0.06em;
  text-transform:uppercase;
  white-space:nowrap;
}
.mini-search input{
  flex:1;
  font-family:var(--sans);
  background:transparent;
  border:none;outline:none;
  padding:8px 12px;
  font-size:14px;
  color:var(--ink);
}

/* Hero comune */
.comune-hero{
  padding:20px 0 16px;
  border-bottom:1px solid var(--rule);
  background:var(--paper);
  position:sticky;
  top:76px;
  z-index:80;
}
.comune-eyebrow{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--ink-mute);
  margin-bottom:12px;
}
.comune-title{
  font-family:var(--serif);
  font-weight:300;
  font-size:clamp(28px,3.5vw,44px);
  letter-spacing:-0.04em;
  line-height:1;
  font-variation-settings:"opsz" 72, "SOFT" 30;
  margin-bottom:4px;
}
.comune-title em{
  font-style:italic;
  color:var(--accent);
  font-weight:400;
  font-variation-settings:"opsz" 144, "SOFT" 100, "WONK" 1;
}
.comune-meta{
  display:flex;flex-wrap:wrap;gap:24px;
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--ink-mute);
}
.comune-meta b{color:var(--ink);font-weight:500}
.comune-actions{position:absolute;top:0;right:24px}
.comune-hero .wrap{position:relative}
.btn-download{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:12px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  background:var(--accent);color:#fff;
  border:none;border-radius:4px;
  padding:10px 16px;cursor:pointer;
  transition:background 0.15s ease;
}
.btn-download:hover{background:var(--ink)}
.btn-download:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.btn-download:disabled{opacity:0.6;cursor:wait}
.btn-download .ico{font-size:14px}

/* Tabs: vedi base.css (grid layout) */
/* Tab content */
.tab-pane{display:none;padding:48px 0}
.tab-pane.active{display:block}
.section-title{
  font-family:var(--serif);
  font-style:italic;
  color:var(--ink-mute);
  font-size:14px;
  margin-bottom:6px;
}
.section-h{
  font-family:var(--serif);
  font-weight:300;
  font-size:32px;
  letter-spacing:-0.025em;
  margin-bottom:24px;
  font-variation-settings:"opsz" 72, "SOFT" 50;
}
.section-h em{font-style:italic;color:var(--accent);font-variation-settings:"opsz" 72, "SOFT" 100, "WONK" 1}

/* KPI per tab */
.tab-kpis{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:0;
  border:2px solid var(--rule);
  margin-bottom:32px;
}
.tab-kpi{
  padding:24px;
  border-right:1px solid var(--rule);
  background:var(--paper);
}
.tab-kpi:last-child{border-right:none}
.tab-kpi .lab{
  font-family:var(--mono);
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.14em;
  color:var(--ink-mute);
  margin-bottom:8px;
}
.tab-kpi .val{
  font-family:var(--serif);
  font-size:36px;
  font-weight:400;
  letter-spacing:-0.02em;
  font-variation-settings:"opsz" 72, "SOFT" 30;
  line-height:1;
}
.tab-kpi.tbd .val{font-style:italic;color:var(--ink-mute)}

/* Tab Sanità: grid 3 col su desktop (3+3 con 6 KPI), 2 col tablet, 1 col mobile.
   Override del default .tab-kpis che usa auto-fit minmax(200px,1fr) e con 6 voci
   si appiattisce a 5+1 dentro un wrap da 1200px. */
.sanita-kpis{
  grid-template-columns:repeat(3,1fr) !important;
}
.sanita-kpis .tab-kpi:nth-child(3n){
  border-right:none;
}
.sanita-kpis .tab-kpi:nth-child(-n+3){
  border-bottom:1px solid var(--rule);
}
@media (max-width:900px){
  .sanita-kpis{grid-template-columns:repeat(2,1fr) !important;}
  .sanita-kpis .tab-kpi{border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);}
  .sanita-kpis .tab-kpi:nth-child(3n){border-right:1px solid var(--rule);}
  .sanita-kpis .tab-kpi:nth-child(2n){border-right:none;}
  .sanita-kpis .tab-kpi:nth-last-child(-n+2){border-bottom:none;}
}
@media (max-width:540px){
  .sanita-kpis{grid-template-columns:1fr !important;}
  .sanita-kpis .tab-kpi{border-right:none;border-bottom:1px solid var(--rule);}
  .sanita-kpis .tab-kpi:last-child{border-bottom:none;}
}
.sanita-kpis .tab-kpi .sub{
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-mute);
  text-transform:uppercase;
  letter-spacing:0.06em;
  margin-top:6px;
}

/* Tab Sanità: mappa Leaflet + filtri chip + marker SVG colorati */
.sanita-map-wrap{margin:32px 0 24px;}
.sanita-h3{font-family:var(--serif);font-size:22px;color:var(--ink);font-weight:400;margin:0 0 8px;font-style:italic;}
.sanita-map-note{font-size:13px;line-height:1.55;margin:0 0 14px;color:var(--ink-mute);}
.sanita-map{height:520px;border-radius:8px;overflow:hidden;background:#eef2f5;position:relative;z-index:0;isolation:isolate;}
@media (max-width:720px){.sanita-map{height:420px;}}

.sanita-filters{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px;align-items:center;}
.sanita-chip{
  display:inline-flex;align-items:center;gap:6px;padding:7px 12px;min-height:32px;
  background:var(--paper-2);border:1px solid var(--ink-mute);border-radius:16px;
  font-family:var(--mono);font-size:11px;color:var(--ink);cursor:pointer;
  transition:all .15s ease;line-height:1;text-transform:uppercase;letter-spacing:.04em;
}
.sanita-chip:hover{background:#fff;border-color:var(--accent);}
.sanita-chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.sanita-chip[aria-pressed="false"]{opacity:.4;background:transparent;}
.sanita-chip[aria-pressed="false"] .sanita-chip-dot{opacity:.4;}
.sanita-chip-dot{
  width:12px;height:12px;border-radius:50%;flex-shrink:0;
  border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,0.18);
}
.sanita-chip-count{font-size:10px;color:var(--ink-mute);font-weight:600;}

/* Marker SVG: cerchio colorato con bordo bianco, ombra leggera */
.sanita-pin{
  width:20px;height:20px;border-radius:50%;border:2.5px solid #fff;
  box-shadow:0 1px 4px rgba(0,0,0,0.35);
}
.sanita-pin.hosp{width:28px;height:28px;}  /* Ospedali leggermente più grandi */

/* Colori semantici: */
.sanita-c-farm-ord{background:#2E7D32;}      /* Farmacia ordinaria - verde scuro */
.sanita-c-farm-disp{background:#0277BD;}     /* Dispensario/Succursale - blu */
.sanita-c-farm-stag{background:#9E9D24;}     /* Dispensario stagionale - giallo oliva */
.sanita-c-parafarm{background:#EF6C00;}      /* Parafarmacia - arancione */
.sanita-c-osp{background:#C62828;}           /* Ospedale - rosso */

.sanita-popup{font-family:var(--ui);font-size:12px;min-width:200px;max-width:280px;}
.sanita-popup-name{display:block;font-weight:600;margin-bottom:4px;line-height:1.3;}
.sanita-popup-meta{display:block;color:var(--ink-mute);font-size:11px;margin-bottom:2px;}
.sanita-popup-addr{display:block;color:var(--ink);font-size:11px;line-height:1.35;}
.sanita-popup-pl{display:inline-block;margin-top:4px;padding:2px 8px;background:#C62828;color:#fff;border-radius:3px;font-size:11px;font-weight:600;}

.sanita-legend{display:flex;flex-wrap:wrap;gap:14px;margin:10px 0 4px;font-family:var(--mono);font-size:10px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.05em;}
.sanita-legend-item{display:inline-flex;align-items:center;gap:6px;}

/* Disclaimer qualità coordinate (geocoding ANNCSU): collapsed di default,
   appare solo se ci sono coord ricalcolate, droppate o no_coord. */
.sanita-coord-disclaimer{
  margin:0 0 18px;
  padding:0;
  border:1px solid #f0c674;
  border-left:3px solid #d68910;
  background:#fffaf3;
  border-radius:4px;
  font-size:13px;
  line-height:1.55;
}
.sanita-coord-disclaimer > summary{
  cursor:pointer;
  list-style:none;
  padding:10px 14px;
  color:#7a5a1c;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.sanita-coord-disclaimer > summary::-webkit-details-marker{display:none;}
.sanita-coord-disclaimer > summary:hover{background:#fff5e1;}
.sanita-coord-disclaimer > summary:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;}
.sanita-coord-icon{font-size:16px;color:#d68910;flex-shrink:0;}
.sanita-coord-toggle{
  font-family:var(--mono);font-size:10px;text-transform:uppercase;
  letter-spacing:.06em;margin-left:auto;color:#7a5a1c;
}
.sanita-coord-disclaimer[open] > summary{
  border-bottom:1px solid #f0c674;
  background:#fff5e1;
}
.sanita-coord-body{
  padding:14px 18px 4px;
  color:var(--ink);
}
.sanita-coord-body p{margin:0 0 12px;}
.sanita-coord-body code{
  font-family:var(--mono);
  background:rgba(0,0,0,0.04);
  padding:1px 5px;
  border-radius:3px;
  font-size:12px;
}
.sanita-coord-body a{color:var(--accent);}
.sanita-coord-stats{
  margin:0 0 12px;
  padding:0 0 0 22px;
}
.sanita-coord-stats li{margin-bottom:6px;}
.sanita-coord-footer{
  font-style:italic;
  color:var(--ink-mute);
  font-size:12px;
  padding:8px 0;
  border-top:1px dashed #f0c674;
}

.placeholder{
  padding:64px 32px;
  text-align:center;
  border:1px dashed var(--ink-mute);
  font-family:var(--serif);
  font-style:italic;
  color:var(--ink-mute);
  font-size:18px;
}
.placeholder strong{
  display:block;
  font-style:normal;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--ink);
  margin-bottom:12px;
}

footer{
  padding:32px 0;
  border-top:2px solid var(--rule);
  background:var(--ink);
  color:var(--paper);
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
}
footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}
footer a{color:rgba(255,255,255,0.85);text-decoration:none}

/* Loading state */
.loading{
  padding:120px 32px;
  text-align:center;
  font-family:var(--serif);
  font-style:italic;
  color:var(--ink-mute);
}
.loading::after{
  content:"";
  display:inline-block;
  width:8px;height:8px;
  border-radius:50%;
  background:var(--accent);
  margin-left:8px;
  animation:pulse 1.2s infinite;
}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.tab-pane.active{animation:fadein .4s ease-out}

/* ---- Tab Opere ---- */
.section-sub{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink-mute);margin:0 0 32px;max-width:760px;line-height:1.55;}
.section-sub em{color:var(--ink);font-style:italic;}
.tab-warning{padding:14px 18px;margin:24px 0;border-left:3px solid var(--gold);background:var(--paper-2);font-family:var(--serif);font-size:14px;color:var(--ink-soft);font-style:italic;}

/* ---- Tab Contratti ---- */
.contratti-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:0;border:1px solid var(--ink-mute);margin:24px 0 56px;}
.ck-card{padding:18px 20px;border-right:1px solid var(--ink-mute);background:var(--paper);}
.ck-card:last-child{border-right:none;}
.ck-lab{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-mute);margin-bottom:8px;}
.ck-val{font-family:var(--serif);font-size:32px;font-weight:400;letter-spacing:-0.02em;line-height:1.05;font-variation-settings:"opsz" 72, "SOFT" 30;overflow-wrap:break-word;word-break:break-word;}
.ck-val-date{font-size:22px;font-family:var(--mono);}
.ck-sub{font-family:var(--mono);font-size:11px;color:var(--ink-mute);margin-top:4px;}

/* Mobile: 2 colonne KPI con cifre rimpicciolite per evitare overflow di numeri lunghi (es. "€38.412.087") */
@media (max-width: 720px){
  .contratti-kpis{grid-template-columns:repeat(2, 1fr);}
  .ck-card{padding:14px 12px;border-right:1px solid var(--ink-mute);border-bottom:1px solid var(--ink-mute);}
  .ck-card:nth-child(2n){border-right:none;}
  .ck-card:nth-last-child(-n+2){border-bottom:none;}
  .ck-val{font-size:22px;letter-spacing:-0.03em;}
  .ck-val-date{font-size:16px;}
  .ck-lab{font-size:9px;letter-spacing:0.1em;margin-bottom:6px;}
}
@media (max-width: 380px){
  .ck-val{font-size:18px;}
  .ck-val-date{font-size:14px;}
}
.cpv-row{display:grid;grid-template-columns:280px 1fr 180px;gap:16px;align-items:center;padding:14px 0;border-bottom:1px dotted var(--ink-mute);}
.cpv-name{display:flex;flex-direction:column;gap:3px;}
.cpv-desc{font-family:var(--serif);font-size:14px;color:var(--ink);line-height:1.3;}
.cpv-code{font-family:var(--mono);font-size:10px;color:var(--ink-mute);letter-spacing:0.06em;}
.cpv-bar{height:6px;background:var(--paper-2);border-radius:3px;overflow:hidden;}
.cpv-bar-fill{height:100%;background:var(--accent);}
.cpv-meta{display:flex;gap:14px;justify-content:flex-end;font-family:var(--mono);font-size:13px;}
.cpv-n{color:var(--ink);font-weight:600;}
.cpv-eur{color:var(--ink-mute);}

/* ---- Tab Demografia ---- */
.demo-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:32px;margin-top:24px;}
.demo-fasce{display:flex;flex-direction:column;gap:14px;}
.fascia-row{display:grid;grid-template-columns:200px 1fr 130px;gap:12px;align-items:center;}
.fascia-label{font-family:var(--serif);font-size:13px;color:var(--ink);}
.fascia-bar{height:10px;background:var(--paper-2);border-radius:5px;overflow:hidden;}
.fascia-bar-fill{height:100%;background:var(--accent);}
.fascia-meta{display:flex;gap:10px;justify-content:flex-end;font-family:var(--mono);font-size:12px;}
.fascia-n{color:var(--ink);font-weight:600;}
.fascia-pct{color:var(--ink-mute);}
.piramide-wrap{padding:14px 0;}
.piramide-svg{width:100%;height:auto;display:block;max-width:560px;margin:0 auto;}
@media (max-width:720px){
  .demo-grid{grid-template-columns:1fr;}
  .fascia-row{grid-template-columns:1fr;}
}

/* ---- Tab Profilo (Censimento permanente ISTAT) ---- */
.profilo-section{margin:48px 0 32px;}
.profilo-section + .profilo-section{border-top:1px solid var(--rule);padding-top:36px;}
.profilo-section-h{font-family:var(--serif);font-weight:300;font-size:24px;letter-spacing:-0.02em;margin:0 0 6px;color:var(--ink);}
.profilo-section-h em{font-style:italic;color:var(--accent);}
.profilo-section-sub{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-mute);margin:0 0 18px;}
.profilo-mini-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0;border:1px solid var(--ink-mute);margin:8px 0 20px;}
.profilo-mini-kpis .ck-card:last-child{border-right:none;}
.titoli-bars{display:flex;flex-direction:column;gap:10px;}
.titolo-row{display:grid;grid-template-columns:200px 1fr 130px;gap:12px;align-items:center;}
.titolo-label{font-family:var(--serif);font-size:13px;color:var(--ink);}
.titolo-bar{height:9px;background:var(--paper-2);border-radius:4px;overflow:hidden;}
.titolo-bar-fill{height:100%;background:var(--accent);}
.titolo-meta{display:flex;gap:10px;justify-content:flex-end;font-family:var(--mono);font-size:11px;}
.titolo-n{color:var(--ink);font-weight:600;}
.titolo-pct{color:var(--ink-mute);}
.profilo-mobilita-warning{padding:12px 16px;margin:0 0 16px;border-left:3px solid var(--gold);background:var(--paper-2);font-family:var(--serif);font-size:13px;color:var(--ink-soft);font-style:italic;}
.profilo-mobilita-warning strong{font-style:normal;color:var(--ink);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px;}
.profilo-flag{display:inline-block;background:var(--chart-slate);color:#fff;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:2px 6px;margin-left:8px;vertical-align:middle;border-radius:3px;}
.profilo-na{font-family:var(--serif);font-style:italic;color:var(--ink-mute);padding:24px 0;text-align:center;}
@media (max-width:720px){.titolo-row{grid-template-columns:1fr;}}

/* ---- Tab Turismo (capacita ricettiva ISTAT + flussi provinciali) ---- */
.turismo-cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:20px;}
.turismo-cat-h{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-mute);margin:8px 0 14px;}
.flussi-flag{display:inline-block;background:var(--chart-slate);color:#fff;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:2px 6px;margin-left:8px;vertical-align:middle;border-radius:3px;}

.flussi-warning strong{font-style:normal;color:var(--ink);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px;}
.split-bar{display:grid;grid-template-columns:200px 1fr 130px;gap:12px;align-items:center;margin:8px 0;}
.split-bar-label{font-family:var(--serif);font-size:13px;color:var(--ink);}

.split-bar-ita{height:100%;background:var(--chart-blue-1);}
.split-bar-str{height:100%;background:var(--chart-slate);}
.split-bar-meta{font-family:var(--mono);font-size:11px;color:var(--ink-mute);text-align:right;}

}

/* ---- Tab PNRR (Italia Domani / ReGiS) ---- */
.pnrr-warning{padding:14px 18px;margin:0 0 28px;border-left:3px solid var(--gold);background:var(--paper-2);font-family:var(--serif);font-size:14px;color:var(--ink-soft);font-style:italic;}
.pnrr-warning strong{font-style:normal;color:var(--ink);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px;}
.pnrr-missione-bars{display:flex;flex-direction:column;gap:14px;margin-top:24px;}
.pnrr-missione-row{display:grid;grid-template-columns:240px 1fr 200px;gap:14px;align-items:center;padding:6px 0;}
.pnrr-missione-label{font-family:var(--serif);font-size:14px;color:var(--ink);}
.pnrr-missione-label .mcode{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:600;display:block;letter-spacing:.04em;margin-bottom:2px;}
.pnrr-missione-bar{height:10px;background:var(--paper-2);border-radius:5px;overflow:hidden;}
.pnrr-missione-bar-fill{height:100%;background:var(--accent);}
.pnrr-missione-meta{display:flex;gap:8px;justify-content:flex-end;align-items:baseline;font-family:var(--mono);font-size:12px;}
.pnrr-missione-n{color:var(--ink-mute);}
.pnrr-missione-eur{color:var(--ink);font-weight:600;}
.pnrr-filters{display:grid;grid-template-columns:1fr 220px 200px;gap:12px;margin:24px 0 18px;padding:14px;background:var(--paper-2);border:1px solid var(--ink-mute);position:sticky;top:120px;z-index:30;}
.pnrr-search-input{font-family:var(--sans);font-size:14px;padding:8px 12px;border:1px solid var(--ink-mute);background:var(--paper);color:var(--ink);outline:none;}
.pnrr-search-input:focus{border-color:var(--accent);}
.pnrr-filters select{font-family:var(--mono);font-size:12px;padding:8px 12px;border:1px solid var(--ink-mute);background:var(--paper);color:var(--ink);cursor:pointer;text-transform:uppercase;letter-spacing:.08em;}
.pnrr-list{display:flex;flex-direction:column;gap:6px;}
.pnrr-row{border-bottom:1px solid var(--paper-2);transition:background .15s;}
.pnrr-row:hover{background:var(--paper-2);}
.pnrr-row.expanded{background:var(--paper-2);border-bottom-color:var(--ink-mute);}
.pnrr-row-main{display:grid;grid-template-columns:80px 1fr 140px 110px 100px 24px;gap:14px;align-items:center;padding:14px;cursor:pointer;}
.pnrr-row-mcode{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.04em;}
.pnrr-row-titolo{font-family:var(--serif);font-size:14px;color:var(--ink);line-height:1.3;}
.pnrr-row-cup{font-family:var(--mono);font-size:10px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.04em;margin-top:3px;}
.pnrr-row-eur{font-family:var(--mono);font-size:13px;color:var(--ink);font-weight:600;text-align:right;}
.pnrr-row-stato{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;text-align:center;padding:3px 8px;border-radius:3px;}
.pnrr-row-stato.concluso{background:var(--accent);color:var(--paper);}
.pnrr-row-stato.in-corso{background:var(--gold);color:var(--ink);}
.pnrr-row-stato.altro{background:var(--paper-2);color:var(--ink-mute);}
.pnrr-row-toggle{font-family:var(--mono);font-size:14px;color:var(--ink-mute);text-align:center;}
.pnrr-row-detail{padding:0 14px 18px 94px;display:none;font-family:var(--serif);font-size:13px;color:var(--ink-soft);}
.pnrr-row.expanded .pnrr-row-detail{display:block;}
.pnrr-row-detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:14px 0 6px;}
.pnrr-detail-item .lab{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-mute);margin-bottom:3px;}
.pnrr-detail-item .val{font-family:var(--serif);font-size:13px;color:var(--ink);}
.pnrr-row-detail-sintesi{padding:10px 0 0;font-style:italic;color:var(--ink-mute);font-size:12px;border-top:1px solid var(--paper-2);margin-top:6px;}
.pnrr-empty{font-family:var(--serif);font-style:italic;color:var(--ink-mute);padding:32px 0;text-align:center;}
@media (max-width:720px){
  .pnrr-missione-row{grid-template-columns:1fr;}
  .pnrr-filters{grid-template-columns:1fr;position:static;}
  .pnrr-filters input,.pnrr-filters select{width:100%;min-width:0;box-sizing:border-box;}
  .pnrr-row-main{grid-template-columns:1fr 24px;}
  .pnrr-row-mcode,.pnrr-row-eur,.pnrr-row-stato{display:none;}
  .pnrr-row-detail{padding-left:14px;}
  .pnrr-row-detail-grid{grid-template-columns:1fr;}
}

/* ---- Tab Territorio (ISPRA Suolo + IdroGEO + Rifiuti) ---- */
.terr-warning{padding:14px 18px;margin:0 0 28px;border-left:3px solid var(--gold);background:var(--paper-2);font-family:var(--serif);font-size:14px;color:var(--ink-soft);font-style:italic;}
.terr-warning strong{font-style:normal;color:var(--ink);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px;}
.terr-section{padding:36px 0;border-bottom:1px solid var(--paper-2);}
.terr-section:last-of-type{border-bottom:none;}
.terr-section-title{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);margin-bottom:14px;}
.terr-section-h{font-family:var(--serif);font-size:30px;line-height:1.15;font-weight:400;letter-spacing:-.015em;margin-bottom:8px;font-variation-settings:'opsz' 60,'SOFT' 30;}

.terr-section-sub{font-family:var(--serif);font-size:15px;line-height:1.6;color:var(--ink-soft);max-width:740px;margin-bottom:24px;font-style:italic;}
.terr-mini-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:18px 0 28px;padding:18px;background:var(--paper-2);}

.terr-mini-kpi-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-mute);margin-bottom:4px;}
.terr-mini-kpi-value{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--ink);line-height:1.1;}
.terr-mini-kpi-value .unit{font-size:12px;color:var(--ink-mute);font-weight:400;margin-left:3px;}
.terr-bar-row{display:grid;grid-template-columns:140px 1fr 110px;gap:14px;align-items:center;padding:6px 0;}
.terr-bar-label{font-family:var(--mono);font-size:11px;color:var(--ink);text-transform:uppercase;letter-spacing:.04em;}
.terr-bar-label .scenario{color:var(--ink-mute);font-weight:400;text-transform:none;display:block;font-size:10px;margin-top:2px;letter-spacing:0;}
.terr-bar-track{height:14px;background:var(--paper-2);position:relative;}
.terr-bar-fill{height:100%;background:var(--accent);}
.terr-bar-fill.fr-p4{background:var(--accent);}
.terr-bar-fill.fr-p3{background:var(--chart-danger);}
.terr-bar-fill.fr-p2{background:var(--chart-warning);}
.terr-bar-fill.fr-p1{background:var(--chart-slate-2);}
.terr-bar-fill.al-p3{background:var(--chart-blue-1);}
.terr-bar-fill.al-p2{background:var(--chart-blue-3);}
.terr-bar-fill.al-p1{background:var(--chart-blue-5);}
.terr-bar-meta{font-family:var(--mono);font-size:11px;color:var(--ink);text-align:right;}
.terr-bar-meta .pct{color:var(--ink-mute);font-size:10px;display:block;margin-top:2px;}
.terr-esposti-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:18px;padding:14px;background:var(--paper);border:1px solid var(--paper-2);}
.terr-esposti-cell{text-align:center;}
.terr-esposti-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-mute);margin-bottom:4px;}
.terr-esposti-value{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink);line-height:1.1;}
.terr-esposti-value .pct{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:400;display:block;margin-top:2px;}
.terr-suolo-bars{display:flex;flex-direction:column;gap:8px;margin-top:18px;}
.terr-suolo-row{display:grid;grid-template-columns:120px 1fr 100px;gap:12px;align-items:center;padding:4px 0;}
.terr-suolo-label{font-family:var(--mono);font-size:11px;color:var(--ink);}
.terr-suolo-bar{height:10px;background:var(--paper-2);}
.terr-suolo-bar-fill{height:100%;background:var(--accent);}
.terr-suolo-meta{font-family:var(--mono);font-size:11px;color:var(--ink);text-align:right;}
.terr-rd-trend{display:flex;flex-direction:column;gap:6px;margin-top:18px;}
.terr-rd-row{display:grid;grid-template-columns:60px 1fr 70px;gap:10px;align-items:center;padding:3px 0;}

.terr-rd-bar{height:12px;background:var(--paper-2);position:relative;}
.terr-rd-bar-fill{height:100%;background:var(--accent-2);}
.terr-rd-bar-target{position:absolute;top:-2px;bottom:-2px;width:1px;background:var(--gold);}
.terr-rd-pct{font-family:var(--mono);font-size:11px;color:var(--ink);text-align:right;font-weight:600;}
.terr-aggregato-flag{display:inline-block;padding:3px 8px;background:var(--chart-slate);color:#fff;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-left:10px;vertical-align:middle;border-radius:3px;}
.terr-mappa-card{background:var(--paper-2);padding:18px;font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-top:18px;}
.terr-mappa-card a{color:var(--accent);}
.terr-empty{font-family:var(--serif);font-style:italic;color:var(--ink-mute);padding:24px 0;text-align:center;}
/* Tab Aria - ISPRA SNPA qualità dell'aria */
.aria-meta{display:flex;flex-wrap:wrap;gap:18px;padding:14px 18px;background:var(--paper-2);border-left:3px solid var(--accent-2);margin:0 0 28px;}
.aria-meta-item{font-family:var(--mono);font-size:12px;color:var(--ink-soft);}
.aria-meta-item b{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-mute);font-weight:normal;margin-bottom:2px;}
.aria-kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:0 0 36px;}
@media (max-width:720px){.aria-kpi-grid{grid-template-columns:1fr;}}
.aria-kpi-card{padding:20px 22px;background:var(--paper-2);border-top:3px solid var(--ink-mute);}
.aria-kpi-card.aria-kpi-good{border-top-color:var(--chart-success);}
.aria-kpi-card.aria-kpi-warn{border-top-color:var(--gold);}
.aria-kpi-card.aria-kpi-bad{border-top-color:var(--accent);}
.aria-kpi-label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-mute);margin-bottom:8px;}
.aria-kpi-value{font-family:var(--serif);font-size:42px;font-weight:600;color:var(--ink);line-height:1;}
.aria-kpi-unit{font-size:14px;color:var(--ink-mute);font-weight:400;margin-left:6px;font-family:var(--mono);}
.aria-kpi-sub{font-family:var(--mono);font-size:11px;color:var(--ink-mute);margin-top:6px;}
.aria-kpi-limits{display:flex;flex-direction:column;gap:4px;margin-top:14px;padding-top:12px;border-top:1px solid var(--paper);}
.aria-lim{font-family:var(--mono);font-size:11px;color:var(--ink-soft);}
.aria-lim-hit{color:var(--accent);font-weight:600;}
.aria-lim-warn{color:var(--gold);font-weight:600;}
.aria-kpi-fascia{font-family:var(--mono);font-size:10px;color:var(--ink-mute);margin-top:8px;font-style:italic;}
.aria-h3{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--ink);margin:32px 0 6px;}
.aria-trend-note{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--ink-mute);margin:0 0 16px;}
.aria-chart-wrap{position:relative;height:340px;background:var(--paper-2);padding:18px;margin-bottom:24px;}
@media (max-width:720px){.aria-chart-wrap{height:260px;padding:10px;}}
.aria-stazioni-list{display:flex;flex-direction:column;gap:1px;background:var(--paper-2);margin-bottom:24px;}
.aria-map-wrap{margin:0 0 24px;position:relative;z-index:0;}
#aria-map{height:380px;width:100%;background:var(--paper-2);border:1px solid var(--paper-2);position:relative;z-index:0;}
#aria-map .leaflet-pane,
#aria-map .leaflet-top,
#aria-map .leaflet-bottom,
#aria-map .leaflet-control{z-index:1 !important;}
#aria-map .leaflet-popup-pane{z-index:2 !important;}
@media (max-width:720px){#aria-map{height:280px;}}
.aria-map-legend{display:flex;flex-wrap:wrap;gap:18px;padding:10px 14px;background:var(--paper-2);font-family:var(--mono);font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;border-top:1px solid var(--paper);}
.aria-leg-item{display:inline-flex;align-items:center;gap:6px;}
.aria-leg-dot{display:inline-block;width:10px;height:10px;border-radius:50%;border:1.5px solid var(--paper);}
.aria-pin{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);}
.leaflet-popup-content-wrapper{border-radius:2px;background:var(--paper);box-shadow:0 2px 8px rgba(0,0,0,.18);}
.leaflet-popup-content{margin:12px 14px;font-family:var(--serif);font-size:13px;color:var(--ink-soft);line-height:1.45;}
.aria-popup-name{font-family:var(--serif)!important;font-weight:700!important;color:#0c0c0c!important;font-size:15px!important;margin-bottom:6px!important;display:block!important;line-height:1.2!important;text-transform:none!important;letter-spacing:0!important;}
.aria-popup-meta{font-family:var(--mono)!important;font-size:10px!important;text-transform:uppercase!important;letter-spacing:.06em!important;color:#6a6259!important;display:block!important;}
.aria-popup-code{font-family:var(--mono);font-size:11px;color:var(--accent);margin-top:4px;display:block;}
.leaflet-container a.leaflet-popup-close-button{color:var(--ink-mute);}
.leaflet-control-attribution{font-family:var(--mono)!important;font-size:10px!important;background:rgba(244,239,230,.85)!important;}
.aria-stazione-row{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--paper);gap:14px;}
.aria-staz-name{font-family:var(--serif);font-size:15px;color:var(--ink);font-weight:500;margin-bottom:4px;}
.aria-staz-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.aria-staz-badge{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;background:var(--paper-2);color:var(--ink-soft);}
.aria-staz-code{font-family:var(--mono);font-size:11px;color:var(--accent);}
.aria-staz-geo{font-family:var(--mono);font-size:11px;color:var(--ink-mute);white-space:nowrap;}
.aria-stazioni-detail{display:flex;flex-direction:column;gap:6px;margin-bottom:24px;}
.aria-staz-acc{background:var(--paper-2);border-left:2px solid transparent;}
.aria-staz-acc[open]{border-left-color:var(--accent-2);}

.aria-staz-acc summary::-webkit-details-marker{display:none;}
.aria-staz-acc summary::before{content:'+';font-family:var(--mono);font-size:16px;color:var(--ink-mute);margin-right:4px;}

.aria-staz-acc-name{font-family:var(--serif);font-size:14px;color:var(--ink);flex:1;}
.aria-staz-acc-code{font-family:var(--mono);font-size:11px;color:var(--accent);}
.aria-staz-acc-range{font-family:var(--mono);font-size:11px;color:var(--ink-mute);}
.aria-staz-acc-body{padding:0 18px 18px;}

.aria-yearly-table td{padding:6px;color:var(--ink-soft);border-bottom:1px solid var(--paper);}
.aria-yearly-table .aria-y-anno{color:var(--ink);font-weight:600;}
.aria-empty{padding:32px 24px;background:var(--paper-2);border-left:3px solid var(--ink-mute);font-family:var(--serif);font-size:14px;color:var(--ink-soft);line-height:1.55;}

.aria-source{font-family:var(--mono);font-size:11px;color:var(--ink-mute);margin-top:24px;padding-top:16px;border-top:1px solid var(--paper-2);}

@media (max-width:720px){

  .terr-bar-row{grid-template-columns:1fr;gap:4px;}
  .terr-bar-meta{text-align:left;}

  .terr-suolo-meta{text-align:left;}

<script>
const MCP_ENDPOINT = window.location.hostname === 'localhost'
  ? 'http://localhost:8787/mcp'
  : 'https://cruscotto-italia-mcp.datigovit.workers.dev/mcp';

// Base URL per fetch lazy degli shard ANNCSU FULL (Opzione C).
// Endpoint Worker GET /data/anncsu_full/<istat>.json → pass-through R2.
// Stessa origine del Worker MCP (Cloudflare lo serve, CORS *).
const ANNCSU_FULL_BASE = MCP_ENDPOINT.replace(/\/mcp$/, '/data/anncsu_full');

async function mcpCall(toolName, args) {
  const res = await fetch(MCP_ENDPOINT, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      jsonrpc: '2.0', id: Date.now(),
      method: 'tools/call',
      params: { name: toolName, arguments: args }
    })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return JSON.parse(data.result.content[0].text);
}

function fmtNum(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString('it-IT');
}

// === Palette grafici istituzionale (Design Italia) ===
// Legge i token CSS da tokens.css :root, cambiando i token si aggiornano i grafici.
function getCSS(varName) {
  return getComputedStyle(document.documentElement)
    .getPropertyValue(varName).trim();
}
// Versioni risolte hex (Chart.js non interpreta var() nel canvas)
function resolveChartColors() {
  return {
    blue: ['--chart-blue-1','--chart-blue-2','--chart-blue-3','--chart-blue-4','--chart-blue-5','--chart-blue-6'].map(getCSS),
    sequence: ['--chart-blue-1','--chart-blue-2','--chart-blue-3','--chart-blue-4','--chart-blue-5','--chart-blue-6','--chart-slate','--chart-slate-2'].map(getCSS),
    ink: getCSS('--chart-ink'),
    slate: getCSS('--chart-slate'),
    slateLight: getCSS('--chart-slate-2'),
    success: getCSS('--chart-success'),
    warning: getCSS('--chart-warning'),
    danger: getCSS('--chart-danger'),
  };
}
// hex -> rgba con alpha (per fill area line chart)
function hexToRgba(hex, alpha) {
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2), 16);
  const g = parseInt(h.substring(2,4), 16);
  const b = parseInt(h.substring(4,6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

        ${a.codice_fiscale ? `<span><b>CF Ente</b> ${a.codice_fiscale}</span>` : ''}

    </div></section>

    <div class="tabs-bar"><span class="tabs-scroll-hint left">←</span><span class="tabs-scroll-hint right">→</span><div class="wrap">
      <div class="tabs" role="tablist">
        ${tabs.map((t, i) => `
          <button class="tab ${i === 0 ? 'active' : ''}" role="tab" data-tab="${t.id}" aria-selected="${i === 0}">

          </button>
        `).join('')}
      </div>
    </div></div>

    <div class="wrap">
      <div class="tab-pane active" id="pane-panoramica">
        <div class="section-title">§ Panoramica</div>
        <h2 class="section-h">Vista <em>360°</em> del comune.</h2>
        <div class="tab-kpis">
          <div class="tab-kpi"><div class="lab">Popolazione</div><div class="val">${k.popolazione != null ? fmtNum(k.popolazione) : '—'}</div></div>
          <div class="tab-kpi ${k.contratti?.count != null ? '' : 'tbd'}">
            <div class="lab">Contratti ANAC</div>
            <div class="val">${k.contratti?.count != null ? fmtNum(k.contratti.count) : '—'}</div>
            ${k.contratti?.importo_totale != null ? `<div class="sub">€${fmtNum(Math.round(k.contratti.importo_totale))}</div>` : ''}
          </div>
          <div class="tab-kpi ${k.opere?.count != null ? '' : 'tbd'}">

            <div class="val">${k.opere?.count != null ? fmtNum(k.opere.count) : '—'}</div>

          </div>

// ----------------------------------------------------------------------------
// Tab Opere - Dettaglio filtrabile (BDAP shard per comune)
// ----------------------------------------------------------------------------

window.__opereDettaglioCache = window.__opereDettaglioCache || {};

async function loadOpereDettaglio(istat) {
  const container = document.getElementById('opere-dettaglio-content');
  if (!container) return;

  // Cache hit?
  const cached = window.__opereDettaglioCache[istat];
  if (cached) {
    renderOpereDettaglioContent(container, cached);
    return;
  }

  try {
    const data = await mcpCall('comune_opere_dettaglio', { istat_code: istat });
    if (data.error) {
      container.innerHTML = `
        <div class="placeholder">
          <strong>Dati non disponibili</strong>
          ${data.error}
        </div>`;
      return;
    }
    window.__opereDettaglioCache[istat] = data;
    renderOpereDettaglioContent(container, data);
  } catch (err) {
    container.innerHTML = `
      <div class="placeholder">
        <strong>Errore di rete</strong>
        ${err.message}
      </div>`;
  }
}

function renderOpereDettaglioContent(container, data) {
  const progetti = data.progetti || [];
  if (!progetti.length) {
    container.innerHTML = `<div class="placeholder">Nessun progetto attivo nel 2025.</div>`;
    return;
  }

  // Calcolo distribuzioni lato frontend dai progetti (i campi
  // distribuzione_stati/settori/totale_costo_eff non sono nel dashboard shard A1).
  const totale = progetti.reduce((sum, p) => sum + (p.costo_eff || 0), 0);
  const stati = [...new Set(progetti.map(p => p.stato).filter(Boolean))].sort();
  const settori = [...new Set(progetti.map(p => p.settore).filter(Boolean))].sort();

  container.innerHTML = `
    <div class="spese-filters">
      <input type="search" id="opere-search" class="spese-search-input"
             placeholder="Cerca tra i ${progetti.length} progetti (descrizione, CUP)…" autocomplete="off">
      <select id="opere-stato">
        <option value="">Tutti gli stati</option>
        ${stati.map(s => `<option value="${s}">${s}</option>`).join('')}
      </select>
      <select id="opere-settore">
        <option value="">Tutti i settori</option>
        ${settori.map(s => `<option value="${s}">${s}</option>`).join('')}
      </select>
      <select id="opere-sort">
        <option value="costo_desc">Costo ↓</option>
        <option value="costo_asc">Costo ↑</option>
        <option value="cup">CUP</option>
        <option value="alpha">Descrizione A-Z</option>
        <option value="data_recent">Data inizio recente</option>
      </select>
    </div>

    <div class="spese-list" id="opere-list">
      ${progetti.map((p, i) => renderProgettoRow(p, i, totale)).join('')}
    </div>
  `;

  const search = document.getElementById('opere-search');
  const statoSel = document.getElementById('opere-stato');
  const settoreSel = document.getElementById('opere-settore');
  const sortSel = document.getElementById('opere-sort');
  const list = document.getElementById('opere-list');

  function applyFilters() {
    const q = search.value.toLowerCase().trim();
    const st = statoSel.value;
    const se = settoreSel.value;
    const sort = sortSel.value;
    let f = progetti.filter(p => {
      const desc = (p.descrizione || '').toLowerCase();
      const cup = (p.cup || '').toLowerCase();
      if (q && !desc.includes(q) && !cup.includes(q)) return false;
      if (st && p.stato !== st) return false;
      if (se && p.settore !== se) return false;
      return true;
    });
    if (sort === 'costo_desc') f.sort((a,b)=>(b.costo_eff||0)-(a.costo_eff||0));
    else if (sort === 'costo_asc') f.sort((a,b)=>(a.costo_eff||0)-(b.costo_eff||0));
    else if (sort === 'cup') f.sort((a,b)=>(a.cup||'').localeCompare(b.cup||''));
    else if (sort === 'alpha') f.sort((a,b)=>(a.descrizione||'').localeCompare(b.descrizione||'','it'));
    else if (sort === 'data_recent') f.sort((a,b)=>{
      // null/empty alla fine, valori validi ordine decrescente
      const da = a.data_inizio || '';
      const db = b.data_inizio || '';
      if (!da && !db) return 0;
      if (!da) return 1;
      if (!db) return -1;
      return db.localeCompare(da);
    });
    list.innerHTML = f.length
      ? f.map((p,i)=>renderProgettoRow(p,i,totale)).join('')
      : `<div class="placeholder">Nessun progetto corrisponde ai filtri.</div>`;
    bindOpereRowClicks();
  }
  search.addEventListener('input', applyFilters);
  statoSel.addEventListener('change', applyFilters);
  settoreSel.addEventListener('change', applyFilters);
  sortSel.addEventListener('change', applyFilters);
  bindOpereRowClicks();
}

function renderProgettoRow(p, idx, totale) {
  const costo = p.costo_eff || p.costo_prev || 0;
  const pct = totale > 0 ? (costo / totale * 100) : 0;
  const barW = Math.min(100, Math.max(0.5, pct));
  const desc = p.descrizione || '(senza descrizione)';
  return `
    <div class="spesa-row opera-row" data-idx="${idx}" data-cup="${p.cup}">
      <div class="spesa-main">
        <div class="spesa-meta-left">
          <div class="spesa-desc">${desc}</div>
          <div class="spesa-cod">
            <span class="cod">${p.cup}</span>
            <span class="titolo">${p.stato}</span>
            ${p.settore ? `<span class="opera-settore">${p.settore}</span>` : ''}
            ${p.data_inizio ? `<span class="opera-date">avviato ${p.data_inizio}</span>` : ''}
          </div>
        </div>
        <div class="spesa-bar"><div class="spesa-bar-fill" style="width:${barW}%"></div></div>
        <div class="spesa-amount">
          <div class="spesa-eur">€${fmtNum(Math.round(costo))}</div>
          <div class="spesa-pct">${pct.toFixed(1)}%</div>
        </div>
        <div class="spesa-expand">▾</div>
      </div>
      <div class="spesa-detail" style="display:none">
        <div class="opera-detail-grid">
          <div class="opera-detail-item">
            <div class="opera-detail-label">Sottosettore</div>
            <div class="opera-detail-val">${p.sottosettore || '—'}</div>
          </div>
          <div class="opera-detail-item">
            <div class="opera-detail-label">Natura intervento</div>
            <div class="opera-detail-val">${p.natura || '—'}</div>
          </div>
          <div class="opera-detail-item">
            <div class="opera-detail-label">Data inizio</div>
            <div class="opera-detail-val">${p.data_inizio || '—'}</div>
          </div>
          <div class="opera-detail-item">
            <div class="opera-detail-label">Data fine prevista</div>
            <div class="opera-detail-val">${
              !p.data_fine || p.data_fine.startsWith('9999')
                ? '<em style="color:var(--ink-mute)">In corso</em>'
                : p.data_fine
            }</div>
          </div>
          <div class="opera-detail-item">
            <div class="opera-detail-label">Costo previsto</div>
            <div class="opera-detail-val">€${fmtNum(Math.round(p.costo_prev || 0))}</div>
          </div>
          <div class="opera-detail-item">
            <div class="opera-detail-label">Costo effettivo</div>
            <div class="opera-detail-val">€${fmtNum(Math.round(p.costo_eff || 0))}</div>
          </div>
        </div>
        <div class="opera-finanz-block">
          <div class="opera-finanz-label">Mix finanziamenti</div>
          <div class="opera-finanz-bars">
            ${renderFinanzBar('Statali', p.fin_statali, getCSS('--chart-blue-1'))}
            ${renderFinanzBar('Europei', p.fin_europei, getCSS('--chart-blue-2'))}
            ${renderFinanzBar('Enti territoriali', p.fin_enti_terr, getCSS('--chart-blue-3'))}
            ${renderFinanzBar('Privati', p.fin_privati, getCSS('--chart-blue-4'))}
            ${renderFinanzBar('Altri', p.fin_altri, getCSS('--chart-slate'))}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderFinanzBar(label, value, color) {
  if (!value || value <= 0) return '';
  return `
    <div class="finanz-row">
      <div class="finanz-label">${label}</div>
      <div class="finanz-bar"><div class="finanz-bar-fill" style="background:${color}"></div></div>
      <div class="finanz-val">€${fmtNum(Math.round(value))}</div>
    </div>
  `;
}

function bindOpereRowClicks() {
  document.querySelectorAll('.opera-row').forEach(row => {
    const main = row.querySelector('.spesa-main');
    const detail = row.querySelector('.spesa-detail');
    const arrow = row.querySelector('.spesa-expand');
    if (!main || !detail || !arrow) return;
    main.addEventListener('click', () => {
      const open = detail.style.display !== 'none';
      detail.style.display = open ? 'none' : 'block';
      arrow.textContent = open ? '▾' : '▴';
      row.classList.toggle('expanded', !open);
    });
  });
}

window.__demografiaCache = window.__demografiaCache || {};

function renderDemografiaTabSkeleton() {
  return `
    <div class="tab-pane" id="pane-demografia">
      <div class="section-title">§ demografia</div>
      <h2 class="section-h">Popolazione al <em>1 gennaio 2026</em>.</h2>

      </p>
      <div id="demografia-content">
        <div class="spese-loading" role="status" aria-live="polite">
          <div class="spese-loading-spinner" aria-hidden="true"></div>
          <div>Caricamento dati ISTAT…</div>
        </div>
      </div>
    </div>
  `;
}

async function loadDemografia(istat) {
  const container = document.getElementById('demografia-content');
  if (!container) return;
  const cached = window.__demografiaCache[istat];
  if (cached) {
    renderDemografiaContent(container, cached);
    return;
  }
  try {
    const data = await mcpCall('comune_demografia', { istat_code: istat });
    if (data.error) {
      container.innerHTML = `<div class="placeholder"><strong>Dati non disponibili</strong>${data.error}</div>`;
      return;
    }
    window.__demografiaCache[istat] = data;
    renderDemografiaContent(container, data);
  } catch (err) {
    container.innerHTML = `<div class="placeholder"><strong>Errore di rete</strong>${err.message}</div>`;
  }
}

function renderDemografiaContent(container, data) {
  const f = data.fasce_eta || {};
  container.innerHTML = `
    <div class="contratti-kpis">
      <div class="ck-card">
        <div class="ck-lab">Popolazione</div>
        <div class="ck-val">${fmtNum(data.popolazione_totale)}</div>
        <div class="ck-sub">${fmtNum(data.maschi)} M · ${fmtNum(data.femmine)} F</div>

function renderFasciaBar(label, fascia) {
  if (!fascia) return '';
  return `
    <div class="fascia-row">
      <div class="fascia-label">${label}</div>
      <div class="fascia-bar"><div class="fascia-bar-fill" style="width:${fascia.pct}%"></div></div>
      <div class="fascia-meta">
        <span class="fascia-n">${fmtNum(fascia.n)}</span>
        <span class="fascia-pct">${fascia.pct}%</span>
      </div>
    </div>
  `;
}

function renderPiramideEta(piramide) {
  if (!piramide.length) return '<div class="placeholder">Dati non disponibili</div>';
  // Raggruppa per fasce di 5 anni: 0-4, 5-9, ..., 95-99, 100+
  const fasce = [];
  for (let start = 0; start < 100; start += 5) {
    const slice = piramide.filter(p => p.eta >= start && p.eta < start + 5);
    fasce.push({
      label: `${start}-${start + 4}`,
      m: slice.reduce((s, p) => s + (p.m || 0), 0),
      f: slice.reduce((s, p) => s + (p.f || 0), 0),
    });
  }
  // 100+
  const cento = piramide.filter(p => p.eta >= 100);
  fasce.push({
    label: '100+',
    m: cento.reduce((s, p) => s + (p.m || 0), 0),
    f: cento.reduce((s, p) => s + (p.f || 0), 0),
  });

  // Trova il max per scalare le barre
  const maxVal = Math.max(...fasce.flatMap(x => [x.m, x.f]), 1);
  const W = 320;     // larghezza area barra ciascun lato
  const H = 16;      // altezza fascia
  const GAP = 2;     // gap tra barre
  const LABEL_W = 60;
  const totalH = fasce.length * (H + GAP);

  // Inverto l'ordine così 100+ in cima e 0-4 in basso (piramide canonica)
  const fasceRev = [...fasce].reverse();

  const bars = fasceRev.map((f, i) => {
    const y = i * (H + GAP);
    const wM = (f.m / maxVal) * W;
    const wF = (f.f / maxVal) * W;
    return `
      <g>
        <rect x="${W - wM}" y="${y}" width="${wM}" height="${H}" fill="#3a6ea5" />
        <rect x="${W + LABEL_W}" y="${y}" width="${wF}" height="${H}" fill="#5C6F82" />
        <text x="${W + LABEL_W/2}" y="${y + H/2 + 4}" text-anchor="middle"
              font-family="var(--mono)" font-size="9" fill="var(--ink-mute)">
          ${f.label}
        </text>
      </g>
    `;
  }).join('');

  return `
    <svg class="piramide-svg" viewBox="0 0 ${2*W + LABEL_W} ${totalH + 30}" preserveAspectRatio="xMidYMin meet">
      <text x="${W - 10}" y="14" text-anchor="end" font-family="var(--mono)" font-size="11" font-weight="600" fill="#3a6ea5">MASCHI</text>
      <text x="${W + LABEL_W + 10}" y="14" text-anchor="start" font-family="var(--mono)" font-size="11" font-weight="600" fill="#5C6F82">FEMMINE</text>
      <g transform="translate(0, 22)">${bars}</g>
    </svg>
  `;
}

function turFmtN(v) { return (v == null) ? '—' : fmtNum(v); }
function turFmtPct(v) { return (v == null) ? '—' : v.toFixed(1) + '%'; }

function renderCapacitaSection(cap, alb, ext) {
  const albStrutt = alb.totale_strutture || 0;
  const extStrutt = ext.totale_strutture || 0;
  const albLetti  = alb.totale_letti || 0;
  const extLetti  = ext.totale_letti || 0;

    { lab: '5 stelle (lusso)',  k: 'stelle_5' },
    { lab: '4 stelle',          k: 'stelle_4' },
    { lab: '3 stelle',          k: 'stelle_3' },
    { lab: '2 stelle',          k: 'stelle_2' },
    { lab: '1 stella',          k: 'stelle_1' },
    { lab: 'Residenze TA',      k: 'residence' },
  ];
  const extCats = [
    { lab: 'B&B',               k: 'bnb' },
    { lab: 'Case in affitto',   k: 'case_in_affitto' },
    { lab: 'Camping/Villaggi',  k: 'camping_villaggi' },
    { lab: 'Agriturismi',       k: 'agriturismi' },
    { lab: 'Ostelli',           k: 'ostelli' },
    { lab: 'Case per ferie',    k: 'case_per_ferie' },
    { lab: 'Rifugi montagna',   k: 'rifugi_montagna' },
    { lab: 'Altri',             k: 'altri_extra' },
  ];

  const albMaxLetti = Math.max(...albCats.map(c => alb[c.k]?.letti || 0)) || 1;
  const extMaxLetti = Math.max(...extCats.map(c => ext[c.k]?.letti || 0)) || 1;

  return `
    <div class="profilo-mini-kpis">
      <div class="ck-card">
        <div class="ck-lab">Alberghieri</div>
        <div class="ck-val">${turFmtN(albStrutt)}</div>
        <div class="ck-sub">${turFmtN(albLetti)} posti letto</div>
      </div>
      <div class="ck-card">
        <div class="ck-lab">Extra-alberghieri</div>
        <div class="ck-val">${turFmtN(extStrutt)}</div>
        <div class="ck-sub">${turFmtN(extLetti)} posti letto</div>
      </div>
      <div class="ck-card">
        <div class="ck-lab">Camere totali</div>
        <div class="ck-val">${turFmtN(cap.totale_camere)}</div>
        <div class="ck-sub">solo strutture alberghiere</div>
      </div>
    </div>

    <div class="turismo-cat-grid">
      <div>
        <h4 class="turismo-cat-h">Alberghi · ${turFmtN(albStrutt)} strutture</h4>
        <div class="titoli-bars">
          ${albCats.map(c => {
            const item = alb[c.k] || {};
            const letti = item.letti || 0;
            const strutt = item.strutture;
            const wpct = albMaxLetti > 0 ? (100 * letti / albMaxLetti) : 0;
            return `
              <div class="titolo-row">
                <div class="titolo-label">${c.lab}</div>
                <div class="titolo-bar"><div class="titolo-bar-fill" style="width:${wpct.toFixed(1)}%"></div></div>
                <div class="titolo-meta">
                  <span class="titolo-n">${turFmtN(letti)}</span>
                  <span class="titolo-pct">${strutt != null ? strutt + ' str.' : '—'}</span>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <div>
        <h4 class="turismo-cat-h">Extra-alberghiero · ${turFmtN(extStrutt)} strutture</h4>
        <div class="titoli-bars">
          ${extCats.map(c => {
            const item = ext[c.k] || {};
            const letti = item.letti || 0;
            const strutt = item.strutture;
            const wpct = extMaxLetti > 0 ? (100 * letti / extMaxLetti) : 0;
            return `
              <div class="titolo-row">
                <div class="titolo-label">${c.lab}</div>
                <div class="titolo-bar"><div class="titolo-bar-fill" style="width:${wpct.toFixed(1)}%"></div></div>
                <div class="titolo-meta">
                  <span class="titolo-n">${turFmtN(letti)}</span>
                  <span class="titolo-pct">${strutt != null ? strutt + ' str.' : '—'}</span>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

window.__pnrrCache = window.__pnrrCache || {};
window.__pnrrFilters = window.__pnrrFilters || { search: '', missione: 'all', stato: 'all' };

function renderPnrrTabSkeleton() {
  return `
    <div class="tab-pane" id="pane-pnrr">
      <div class="section-title">§ pnrr</div>
      <h2 class="section-h">Progetti del <em>PNRR</em>.</h2>
      <p class="section-sub">
        Tutti i progetti finanziati con fondi del Piano Nazionale di Ripresa e Resilienza realizzati direttamente dal Comune.
      </p>
      <div id="pnrr-content">
        <div class="spese-loading" role="status" aria-live="polite">
          <div class="spese-loading-spinner" aria-hidden="true"></div>
          <div>Caricamento dati Italia Domani…</div>
        </div>
      </div>
    </div>
  `;
}

async function loadPnrr(istat) {
  const container = document.getElementById('pnrr-content');
  if (!container) return;
  const cached = window.__pnrrCache[istat];
  if (cached) {
    renderPnrrContent(container, cached);
    updatePnrrTabBadge(cached);
    return;
  }
  try {
    const data = await mcpCall('comune_pnrr', { istat_code: istat });
    if (data.error) {
      container.innerHTML = `
        <div class="pnrr-warning">
          <strong>Nessun progetto</strong>
          Non risultano progetti PNRR attuati direttamente da questo Comune nel dataset Italia Domani.
        </div>
        <div class="pnrr-empty">Il dataset non comprende progetti realizzati nel territorio comunale da altri enti (Regione, Ministeri, GSE, ASL, Soprintendenze, Università).</div>
      `;
      const span = document.querySelector('[data-tab-pnrr-count]');
      if (span) span.textContent = '0';
      return;
    }
    window.__pnrrCache[istat] = data;
    renderPnrrContent(container, data);
    updatePnrrTabBadge(data);
  } catch (err) {
    container.innerHTML = `<div class="placeholder"><strong>Errore di rete</strong>${err.message}</div>`;
    const span = document.querySelector('[data-tab-pnrr-count]');
    if (span) span.textContent = '—';
  }
}

function updatePnrrTabBadge(data) {
  const span = document.querySelector('[data-tab-pnrr-count]');
  if (!span) return;
  const n = data?.kpi?.n_progetti;
  span.textContent = (n != null) ? fmtNum(n) : '—';
}

function pnrrFmtData(d) {
  if (!d) return '—';
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

function pnrrFmtEur(v) {
  if (v == null || v === 0) return '—';
  if (v >= 1e9) return '€' + (v / 1e9).toFixed(1) + 'mld';
  if (v >= 1e6) return '€' + (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '€' + (v / 1e3).toFixed(0) + 'k';
  return '€' + fmtNum(v);
}

function pnrrFmtEurFull(v) {
  if (v == null || v === 0) return '€0';
  return '€' + fmtNum(v);
}

      </div>

        <div class="ck-lab">Missioni distinte</div>

      </div>
    </div>

    <div class="profilo-section">
      <h3 class="profilo-section-h">§ Avanzamento per <em>missione</em></h3>
      <p class="profilo-section-sub">Distribuzione dei progetti per le missioni del PNRR. La barra è proporzionale al finanziamento PNRR.</p>

      <div class="pnrr-filters">

        <select id="pnrr-missione-filter" onchange="onPnrrFilterChange()">
          <option value="all">Tutte le missioni</option>
          ${[...new Set(progetti.map(p => p.missione).filter(Boolean))].sort().map(m => {
            const desc = (perMissione.find(x => x.missione === m) || {}).descrizione || '';
            return `<option value="${m}">${m} — ${desc.slice(0, 35)}</option>`;
          }).join('')}
        </select>
        <select id="pnrr-stato-filter" onchange="onPnrrFilterChange()">
          <option value="all">Tutti gli stati</option>
          <option value="In Corso">In Corso</option>
          <option value="Concluso">Concluso</option>
        </select>
      </div>

      <div class="pnrr-list" id="pnrr-list">
        ${progetti.map((p, idx) => renderPnrrRow(p, idx)).join('')}
      </div>
      <div class="pnrr-empty" id="pnrr-no-results" style="display:none;" role="status" aria-live="polite">Nessun progetto corrisponde ai filtri selezionati.</div>
    </div>

    <div class="tab-footer">
      <strong>Fonte</strong>: <a href="https://www.italiadomani.gov.it/" target="_blank" rel="noopener">Italia Domani</a> — Sistema ReGiS (Presidenza del Consiglio).
      Dataset: PNRR_Progetti.csv. Data estrazione: ${pnrrFmtData(data.data_estrazione)}.
      <br>
      <em>Licenza: Creative Commons Attribuzione 4.0 (CC-BY 4.0). Aggiornamento: mensile.</em>
    </div>
  `;
}

function renderMissioneBars(perMissione) {
  const max = Math.max(...perMissione.map(m => m.tot_pnrr || 0)) || 1;
  return `
    <div class="pnrr-missione-bars">
      ${perMissione.map(m => {
        const wpct = (100 * (m.tot_pnrr || 0) / max).toFixed(1);
        return `
          <div class="pnrr-missione-row">
            <div class="pnrr-missione-label">
              <span class="mcode">${m.missione || ''}</span>
              ${(m.descrizione || '').slice(0, 60)}
            </div>
            <div class="pnrr-missione-bar"><div class="pnrr-missione-bar-fill" style="width:${wpct}%"></div></div>
            <div class="pnrr-missione-meta">
              <span class="pnrr-missione-n">${m.n_progetti} prog.</span>
              <span class="pnrr-missione-eur">${pnrrFmtEur(m.tot_pnrr)}</span>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderPnrrRow(p, idx) {
  const stato = p.stato_avanzamento || '';
  const statoClass = stato === 'Concluso' ? 'concluso' : (stato === 'In Corso' ? 'in-corso' : 'altro');
  const cupShort = (p.cup || '').slice(0, 15);
  const searchBlob = (p.cup + ' ' + p.titolo + ' ' + (p.settore || '') + ' ' + (p.submisura_descrizione || '')).toLowerCase().replace(/"/g, '&quot;');
  return `
    <div class="pnrr-row" data-idx="${idx}" data-missione="${p.missione || ''}" data-stato="${stato}" data-search="${searchBlob}">
      <div class="pnrr-row-main" onclick="togglePnrrRow(this)">
        <div class="pnrr-row-mcode">${p.missione || ''}</div>
        <div>
          <div class="pnrr-row-titolo">${p.titolo || '(senza titolo)'}</div>

        </div>
        <div class="pnrr-row-eur">${pnrrFmtEur(p.finanziamento_pnrr)}</div>
        <div class="pnrr-row-stato ${statoClass}">${stato || '—'}</div>
        <div class="pnrr-row-toggle"><span class="pnrr-row-toggle-icon">▾</span></div>
      </div>

        <div class="pnrr-row-detail-grid">
          <div class="pnrr-detail-item">
            <div class="lab">Submisura</div>
            <div class="val">${p.submisura || '—'}${p.submisura_descrizione ? '<br><em style="font-size:12px;color:var(--ink-mute)">' + p.submisura_descrizione + '</em>' : ''}</div>
          </div>
          <div class="pnrr-detail-item">
            <div class="lab">Finanziamento totale</div>
            <div class="val">${pnrrFmtEurFull(p.finanziamento_totale)} <span style="color:var(--ink-mute);font-size:11px">(di cui PNRR ${pnrrFmtEurFull(p.finanziamento_pnrr)})</span></div>
          </div>
          <div class="pnrr-detail-item">
            <div class="lab">Fase attuale</div>
            <div class="val">${p.fase_iter || '—'}<br><em style="font-size:11px;color:var(--ink-mute)">${p.stato_fase_iter || ''}</em></div>
          </div>
          <div class="pnrr-detail-item">
            <div class="lab">Inizio (previsto / effettivo)</div>
            <div class="val">${pnrrFmtData(p.data_inizio_prevista)} / ${pnrrFmtData(p.data_inizio_effettiva)}</div>
          </div>
          <div class="pnrr-detail-item">
            <div class="lab">Fine (prevista / effettiva)</div>
            <div class="val">${pnrrFmtData(p.data_fine_prevista)} / ${pnrrFmtData(p.data_fine_effettiva)}</div>
          </div>
          <div class="pnrr-detail-item">
            <div class="lab">Settore CUP</div>
            <div class="val">${p.settore || '—'}<br><em style="font-size:11px;color:var(--ink-mute)">${p.natura || ''}</em></div>
          </div>
        </div>
        <div class="pnrr-row-detail-sintesi">
          Soggetto attuatore: <strong>${p.soggetto_attuatore || '—'}</strong>
        </div>
      </div>
    </div>
  `;
}

function togglePnrrRow(el) {
  el.parentElement.classList.toggle('expanded');
}
window.togglePnrrRow = togglePnrrRow;

window.onPnrrFilterChange = function onPnrrFilterChange() {
  const search = (document.getElementById('pnrr-search')?.value || '').toLowerCase().trim();
  const missione = document.getElementById('pnrr-missione-filter')?.value || 'all';
  const stato = document.getElementById('pnrr-stato-filter')?.value || 'all';
  const rows = document.querySelectorAll('#pnrr-list .pnrr-row');
  let visible = 0;
  rows.forEach(r => {
    const matchSearch = !search || (r.dataset.search || '').includes(search);
    const matchMissione = missione === 'all' || r.dataset.missione === missione;
    const matchStato = stato === 'all' || r.dataset.stato === stato;
    const show = matchSearch && matchMissione && matchStato;
    r.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  const noRes = document.getElementById('pnrr-no-results');
  if (noRes) noRes.style.display = visible === 0 ? 'block' : 'none';
}

      </div>
      <div class="ck-card">
        <div class="ck-lab">Raccolta differenziata</div>
        <div class="ck-val">${k.rd_pct_ultimo_anno != null ? k.rd_pct_ultimo_anno.toFixed(1) + '%' : '—'}</div>
        <div class="ck-sub">${k.rd_ultimo_anno || '—'} (Catasto rifiuti)</div>
      </div>
    </div>
  `;

  const suoloHtml = suolo ? renderSuoloSection(suolo, geo) : '';
  const rischioHtml = rischio ? renderRischioSection(rischio) : '';
  const rifiutiHtml = rifiuti ? renderRifiutiSection(rifiuti) : '';
  const mappaHtml = geo ? renderMappaSection(geo, data.denominazione) : '';

  container.innerHTML = `
    ${kpiHtml}
    ${suoloHtml}
    ${rischioHtml}
    ${rifiutiHtml}
    ${mappaHtml}
    <p class="contratti-footer-note">
      Fonti: <a href="https://www.isprambiente.gov.it/it/attivita/suolo-e-territorio/suolo/il-consumo-di-suolo" target="_blank" rel="noopener">ISPRA Consumo di Suolo</a> ·
      <a href="https://idrogeo.isprambiente.it" target="_blank" rel="noopener">ISPRA IdroGEO</a> ·
      <a href="https://www.catasto-rifiuti.isprambiente.it" target="_blank" rel="noopener">ISPRA Catasto Rifiuti</a>.
      Licenza: CC-BY 4.0.
    </p>
  `;
}

function renderSuoloSection(suolo, geo) {

  const seriesHtml = serie.map(r => {
    const w = r.netto_ha != null ? Math.max(2, (r.netto_ha / maxIncr) * 100) : 0;
    const ripr = r.ripristino_ha && r.ripristino_ha > 0 ? ` <span style="color:var(--accent-2)">−${fmtNum(r.ripristino_ha, 1)} ripr.</span>` : '';
    return `
      <div class="terr-suolo-row">
        <div class="terr-suolo-label">${r.intervallo}</div>
        <div class="terr-suolo-bar"><div class="terr-suolo-bar-fill" style="width:${w}%"></div></div>
        <div class="terr-suolo-meta">+${r.netto_ha != null ? fmtNum(r.netto_ha, 1) : '—'} ha${ripr}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="terr-section">
      <div class="terr-section-title">§ consumo di suolo</div>
      <h3 class="terr-section-h">Suolo <em>cementificato</em>.</h3>
      <p class="terr-section-sub">
        Dato ISPRA aggiornato al 2024, serie storica annuale dal 2006.
        Indica la superficie comunale coperta da costruzioni, infrastrutture
        e altre forme di artificializzazione permanente.
      </p>
      <div class="terr-mini-kpis">
        <div>
          <div class="terr-mini-kpi-label">Superficie comunale</div>
          <div class="terr-mini-kpi-value">${ar_kmq != null ? fmtNum(ar_kmq, 1) : '—'}<span class="unit">km²</span></div>
        </div>
        <div>
          <div class="terr-mini-kpi-label">Suolo consumato 2024</div>
          <div class="terr-mini-kpi-value">${stockHa != null ? fmtNum(stockHa, 0) : '—'}<span class="unit">ha</span></div>
        </div>
        <div>
          <div class="terr-mini-kpi-label">% sul comune</div>
          <div class="terr-mini-kpi-value">${stock.pct != null ? stock.pct.toFixed(2) + '%' : '—'}</div>

  const al_max = Math.max(al.ar_p3_kmq || 0, al.ar_p2_kmq || 0, al.ar_p1_kmq || 0) || 1;
  const al_bars = [

    { label: 'P2 media', cls: 'al-p2', area: al.ar_p2_kmq, pct: al.ar_p2_pct },

        <div class="terr-bar-meta">${r.area != null ? fmtNum(r.area, 2) + ' km²' : '—'}<span class="pct">${r.pct != null ? r.pct.toFixed(2) + '%' : ''}</span></div>

    <div class="terr-esposti-grid">
      <div class="terr-esposti-cell">
        <div class="terr-esposti-label">Persone</div>
        <div class="terr-esposti-value">${fr.pop_p3p4 != null ? fmtNum(fr.pop_p3p4) : '—'}<span class="pct">${fr.pop_p3p4_pct != null ? fr.pop_p3p4_pct.toFixed(2) + '%' : ''}</span></div>
      </div>
      <div class="terr-esposti-cell">
        <div class="terr-esposti-label">Famiglie</div>
        <div class="terr-esposti-value">${fr.fam_p3p4 != null ? fmtNum(fr.fam_p3p4) : '—'}<span class="pct">${fr.fam_p3p4_pct != null ? fr.fam_p3p4_pct.toFixed(2) + '%' : ''}</span></div>
      </div>
      <div class="terr-esposti-cell">
        <div class="terr-esposti-label">Edifici</div>
        <div class="terr-esposti-value">${fr.ed_p3p4 != null ? fmtNum(fr.ed_p3p4) : '—'}<span class="pct">${fr.ed_p3p4_pct != null ? fr.ed_p3p4_pct.toFixed(2) + '%' : ''}</span></div>
      </div>
      <div class="terr-esposti-cell">
        <div class="terr-esposti-label">Imprese</div>

      <div class="terr-esposti-cell">
        <div class="terr-esposti-label">Persone</div>

        <div class="terr-esposti-value">${al.fam_p2 != null ? fmtNum(al.fam_p2) : '—'}</div>
      </div>
      <div class="terr-esposti-cell">

        <div class="terr-esposti-label">Imprese</div>
        <div class="terr-esposti-value">${al.im_p2 != null ? fmtNum(al.im_p2) : '—'}</div>
