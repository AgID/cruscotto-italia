const ARIA_PIN_COLORS = {
  'FONDO':       '#3a7a4f',
  'TRAFFICO':    '#c8331f',
  'INDUSTRIALE': '#b8893d'
};

function ariaPinColor(tipo) {
  return ARIA_PIN_COLORS[(tipo || '').toUpperCase()] || '#6a6259';
}

function ariaPinIcon(tipo) {
  const color = ariaPinColor(tipo);
  // divIcon: HTML inline = nessun PNG/SVG esterno
  return L.divIcon({
    className: '',
    iconSize: [22, 22],
    iconAnchor: [11, 11],
    popupAnchor: [0, -10],
    html: `<div class="aria-pin" style="background:${color}"></div>`
  });
}

function renderAriaMap(stazioni) {
  const el = document.getElementById('aria-map');
  if (!el || typeof L === 'undefined') return;
  // Distruggi mappa esistente (cambio comune o re-render)
  if (window.__ariaMapInstance) {
    try { window.__ariaMapInstance.remove(); } catch(e) {}
    window.__ariaMapInstance = null;
  }
  const valide = (stazioni || []).filter(s => s.lat != null && s.lon != null);
  if (!valide.length) return;

  const map = L.map(el, {
    scrollWheelZoom: false,  // evita scroll-hijack dentro pagina lunga
    zoomControl: true,
    attributionControl: true
  });
  window.__ariaMapInstance = map;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);

  const markers = valide.map(s => {
    const m = L.marker([s.lat, s.lon], { icon: ariaPinIcon(s.tipo_stazione) });
    m.bindPopup(`
      <span class="aria-popup-name">${s.nome || '—'}</span>
      <span class="aria-popup-meta">${s.tipo_zona || ''} · ${s.tipo_stazione || ''}</span>
      ${s.station_eu_code ? `<span class="aria-popup-code">${s.station_eu_code}</span>` : ''}
    `);
    return m.addTo(map);
  });

  if (markers.length === 1) {
    map.setView([valide[0].lat, valide[0].lon], 13);
  } else {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.18));
  }

  // Riabilita scroll-wheel zoom on focus/click (UX: evita hijack accidentale)
  map.on('focus', () => map.scrollWheelZoom.enable());
  map.on('blur',  () => map.scrollWheelZoom.disable());
}


// ===========================================================================
// Mappa Leaflet tab Sanità (4c)
// 3 layer indipendenti: farmacie, parafarmacie, ospedali.
// Marker SVG inline (divIcon), chip filtri toggle, popup tipologici.
// ===========================================================================

function _sanitaPinIcon(category, sizeClass = '') {
  // category: 'farm-ord' | 'farm-disp' | 'farm-stag' | 'parafarm' | 'osp'
  return L.divIcon({
    className: '',
    iconSize: category === 'osp' ? [28, 28] : [20, 20],
    iconAnchor: category === 'osp' ? [14, 14] : [10, 10],
    popupAnchor: [0, -10],
    html: `<div class="sanita-pin ${category === 'osp' ? 'hosp' : ''} sanita-c-${category}"></div>`
  });
}

function _sanitaCategoryForFarm(tipo) {
  const t = (tipo || '').toLowerCase();
  if (t.includes('stagional')) return 'farm-stag';
  if (t.includes('dispensari') || t.includes('succursal')) return 'farm-disp';
  return 'farm-ord'; // default: Ordinaria
}

function initSanitaMap(d) {
  const el = document.getElementById('sanita-map');
  if (!el || typeof L === 'undefined') return;
  // Cleanup mappa precedente
  if (window.__sanitaMapInstance) {
    try { window.__sanitaMapInstance.remove(); } catch(e) {}
    window.__sanitaMapInstance = null;
  }

  // Raccolgo tutti i punti dei 3 layer, normalizzo struttura unificata
  const allPunti = [];

  if (d.farmacie && d.farmacie.punti) {
    for (const p of d.farmacie.punti) {
      if (p.lat == null || p.lon == null) continue;
      allPunti.push({
        lat: p.lat, lon: p.lon,
        cat: _sanitaCategoryForFarm(p.tipo),
        kind: 'farmacia',
        nome: p.nome,
        meta: p.tipo || 'Ordinaria',
        indirizzo: p.indirizzo,
        cap: p.cap
      });
    }
  }

  if (d.parafarmacie && d.parafarmacie.punti) {
    for (const p of d.parafarmacie.punti) {
      if (p.lat == null || p.lon == null) continue;
      allPunti.push({
        lat: p.lat, lon: p.lon,
        cat: 'parafarm',
        kind: 'parafarmacia',
        nome: p.nome,
        meta: 'Parafarmacia',
        indirizzo: p.indirizzo,
        cap: p.cap
      });
    }
  }

  // Ospedali: usa stabilimenti (no lat/lon nativi nello shard - geocoding indirizzo TODO)
  // Per ora, se lo stabilimento ha codice_comune dello shard, usiamo il centroide
  // del comune (centro della bbox punti farmacie come fallback approssimativo).
  // Marker ospedale = punto singolo per stabilimento, dimensione fissa.
  if (d.ospedali && d.ospedali.stabilimenti && d.ospedali.stabilimenti.length) {
    // Calcolo centroide approssimativo dei punti farmacie come fallback per ospedali
    // (gli ospedali MdS non hanno lat/lon nello shard 2023).
    let cLat = null, cLon = null;
    if (allPunti.length) {
      cLat = allPunti.reduce((s,p) => s + p.lat, 0) / allPunti.length;
      cLon = allPunti.reduce((s,p) => s + p.lon, 0) / allPunti.length;
    }
    // Dispongo gli ospedali in un piccolo cluster centrato sul centroide
    // con offset radiale per evitare sovrapposizione totale
    const n = d.ospedali.stabilimenti.length;
    d.ospedali.stabilimenti.forEach((s, i) => {
      const angle = (i / Math.max(1, n)) * 2 * Math.PI;
      const r = 0.004 + (i * 0.0008); // ~400-500m di offset radiale
      const lat = cLat != null ? cLat + r * Math.cos(angle) : null;
      const lon = cLon != null ? cLon + r * Math.sin(angle) : null;
      if (lat == null) return;
      allPunti.push({
        lat, lon,
        cat: 'osp',
        kind: 'ospedale',
        nome: s.denominazione || 'Stabilimento ospedaliero',
        meta: s.tipo_struttura || 'Ospedale',
        indirizzo: s.indirizzo || '',
        cap: '',
        pl: s.totale_posti_letto || 0,
        nDisc: (s.discipline || []).length,
        _approx: true  // disclaimer popup
      });
    });
  }

  if (!allPunti.length) {
    el.innerHTML = '<p class="muted" style="padding:24px;text-align:center;font-style:italic;">Nessun presidio georeferenziato.</p>';
    return;
  }

  const map = L.map(el, {
    scrollWheelZoom: false,
    zoomControl: true,
    attributionControl: true
  });
  window.__sanitaMapInstance = map;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);

  // Categorie attive (default: tutte). Cluster grid-based per categoria.
  const activeCats = new Set(['farm-ord','farm-disp','farm-stag','parafarm','osp']);

  // Layer container unico (clusters + singoli marker, re-draw su zoom/move)
  const markersLayer = L.layerGroup().addTo(map);

  // Helper: crea marker singolo
  function makeMarker(p) {
    const m = L.marker([p.lat, p.lon], { icon: _sanitaPinIcon(p.cat) });
    m.bindPopup(_buildSanitaPopupHtml(p));
    return m;
  }

  // Helper: cluster marker con count e colore della categoria dominante
  function makeCluster(lat, lon, cellPunti) {
    const count = cellPunti.length;
    // Categoria dominante (per colore)
    const catCount = {};
    cellPunti.forEach(p => { catCount[p.cat] = (catCount[p.cat] || 0) + 1; });
    const sortedCats = Object.entries(catCount).sort((a,b) => b[1] - a[1]);
    const domCat = sortedCats[0][0];
    const isMixed = sortedCats.length > 1;

    // Colori cluster per categoria dominante (allineati ai marker)
    const CAT_BG = {
      'farm-ord':  '#2E7D32',
      'farm-disp': '#0277BD',
      'farm-stag': '#9E9D24',
      'parafarm':  '#EF6C00',
      'osp':       '#C62828',
    };
    const bg = isMixed ? '#5C6F82' : (CAT_BG[domCat] || '#5C6F82');

    // Size proporzionale al count (32-52px)
    const size = Math.min(52, 32 + Math.floor(Math.log2(count) * 4));

    const html = `<div style="background:${bg};color:#fff;border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;font-family:var(--ui);font-weight:700;font-size:${count >= 100 ? 13 : 14}px;box-shadow:0 2px 6px rgba(0,0,0,0.35);border:2.5px solid #fff;cursor:pointer;">${count}</div>`;

    const m = L.marker([lat, lon], {
      icon: L.divIcon({ html, className: 'sanita-cluster', iconSize: [size, size], iconAnchor: [size/2, size/2] })
    });
    // Click su cluster: zoom-in verso quella cella
    m.on('click', () => {
      map.flyToBounds(L.latLngBounds(cellPunti.map(p => [p.lat, p.lon])).pad(0.25), { maxZoom: 16 });
    });
    return m;
  }

  // Redraw: applica clustering grid-based ai punti delle categorie attive
  function redrawClusters() {
    markersLayer.clearLayers();
    const z = map.getZoom();
    const visible = allPunti.filter(p => activeCats.has(p.cat));
    if (!visible.length) return;

    // Soglia: a zoom >=14 mostra punti singoli, sotto cluster.
    // Anche con <=20 punti totali visibili niente cluster (poco senso).
    if (z >= 14 || visible.length <= 20) {
      visible.forEach(p => markersLayer.addLayer(makeMarker(p)));
      return;
    }

    // Grid clustering: cellSize dipende dal zoom corrente
    const cellSize = z < 10 ? 0.05 : z < 12 ? 0.012 : z < 13 ? 0.004 : 0.0018;
    const grid = new Map();
    visible.forEach(p => {
      const key = `${Math.floor(p.lat / cellSize)}_${Math.floor(p.lon / cellSize)}`;
      if (!grid.has(key)) grid.set(key, []);
      grid.get(key).push(p);
    });
    grid.forEach(cellPunti => {
      if (cellPunti.length <= 2) {
        cellPunti.forEach(p => markersLayer.addLayer(makeMarker(p)));
      } else {
        const avgLat = cellPunti.reduce((s, p) => s + p.lat, 0) / cellPunti.length;
        const avgLon = cellPunti.reduce((s, p) => s + p.lon, 0) / cellPunti.length;
        markersLayer.addLayer(makeCluster(avgLat, avgLon, cellPunti));
      }
    });
  }

  // Fit bounds iniziale: ignoro gli outlier statistici per evitare zoom-out estremo.
  if (allPunti.length === 1) {
    map.setView([allPunti[0].lat, allPunti[0].lon], 14);
  } else if (allPunti.length > 0) {
    const sortedLats = allPunti.map(p => p.lat).sort((a,b) => a-b);
    const sortedLons = allPunti.map(p => p.lon).sort((a,b) => a-b);
    const medLat = sortedLats[Math.floor(sortedLats.length / 2)];
    const medLon = sortedLons[Math.floor(sortedLons.length / 2)];
    const inliers = allPunti.filter(p =>
      Math.abs(p.lat - medLat) <= 0.6 && Math.abs(p.lon - medLon) <= 0.6
    );
    if (inliers.length >= 2) {
      const bounds = L.latLngBounds(inliers.map(p => [p.lat, p.lon]));
      map.fitBounds(bounds.pad(0.12));
    } else {
      const bounds = L.latLngBounds(allPunti.map(p => [p.lat, p.lon]));
      map.fitBounds(bounds.pad(0.12));
    }
  }

  // Render iniziale + re-render on zoom/move
  redrawClusters();
  map.on('zoomend moveend', redrawClusters);

  // Chip toggle handlers
  const chips = document.querySelectorAll('.sanita-chip[data-sanita-filter]');
  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      const cat = chip.dataset.sanitaFilter;
      const wasOn = chip.getAttribute('aria-pressed') === 'true';
      chip.setAttribute('aria-pressed', wasOn ? 'false' : 'true');
      if (wasOn) {
        activeCats.delete(cat);
      } else {
        activeCats.add(cat);
      }
      redrawClusters();
    });
  });

  // Scroll-wheel zoom solo on focus
  map.on('focus', () => map.scrollWheelZoom.enable());
  map.on('blur',  () => map.scrollWheelZoom.disable());

  // FIX: il disclaimer <details> sopra la mappa puo' causare misurazione
  // errata del container al primo paint (Leaflet vede height=0 e non
  // renderizza i tile). Richiedo invalidateSize() dopo il primo paint
  // garantito da requestAnimationFrame doppio.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      map.invalidateSize();
    });
  });
}

(() => {
  const miniInput = document.getElementById('quick-search');
  const miniBox = document.getElementById('mini-suggestions');
  let miniActive = -1;
  let miniDebounce = null;

  function miniRender(results) {
    if (!results || results.length === 0) {
      miniBox.innerHTML = '<div class="mini-suggestion" style="cursor:default;color:var(--ink-mute);font-style:italic">Nessun comune trovato.</div>';
      miniBox.classList.add('open');
      miniInput.setAttribute('aria-expanded', 'true');
      return;
    }
    miniBox.innerHTML = results.map((c, i) => `
      <div class="mini-suggestion" data-istat="${c.istat_code}" data-index="${i}" role="option">
        <span class="mini-suggestion-name">${c.denominazione}</span>
        <span class="mini-suggestion-meta">${c.provincia} · ${c.regione}</span>
      </div>
    `).join('');
    miniBox.classList.add('open');
    miniInput.setAttribute('aria-expanded', 'true');
    miniActive = -1;
  }

  function miniClose() {
    miniBox.classList.remove('open');
    miniInput.setAttribute('aria-expanded', 'false');
    miniActive = -1;
  }

  function miniNav(istat) {
    window.location.href = `/comune.html?istat=${istat}`;
  }

  miniInput.addEventListener('input', () => {
    const q = miniInput.value.trim();
    clearTimeout(miniDebounce);
    if (q.length < 3) { miniClose(); return; }
    miniDebounce = setTimeout(async () => {
      try {
        await ensureComuniIndex();
        miniRender(searchComuneLocal(q, 8));
      } catch (err) {
        console.error('mini-search error:', err);
        miniBox.innerHTML = `<div class="mini-suggestion" style="color:var(--accent);cursor:default">⚠️ ${escapeHtmlMsg(err.message)}</div>`;
        miniBox.classList.add('open');
        miniInput.setAttribute('aria-expanded', 'true');
      }
    }, 200);
  });

  miniInput.addEventListener('keydown', e => {
    if (!miniBox.classList.contains('open')) {
      // Fallback: Invio diretto = redirect home con query
      if (e.key === 'Enter') {
        const q = miniInput.value.trim();
        if (q) window.location.href = `/?q=${encodeURIComponent(q)}`;
      }
      return;
    }
    const items = miniBox.querySelectorAll('.mini-suggestion[data-istat]');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      miniActive = Math.min(items.length - 1, miniActive + 1);
      items.forEach((it, i) => it.classList.toggle('active', i === miniActive));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      miniActive = Math.max(0, miniActive - 1);
      items.forEach((it, i) => it.classList.toggle('active', i === miniActive));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const target = miniActive >= 0 ? items[miniActive] : items[0];
      if (target) miniNav(target.dataset.istat);
    } else if (e.key === 'Escape') {
      miniClose();
      miniInput.blur();
    }
  });

  miniBox.addEventListener('click', e => {
    const s = e.target.closest('.mini-suggestion[data-istat]');
    if (s) miniNav(s.dataset.istat);
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#mini-search-wrap')) miniClose();
  });
})();

/**
 * Riceve lo shard dashboard e ricostruisce un oggetto compatibile con lo
 * schema legacy di comune_overview, che renderComune() si aspetta.
 */
function adaptDashboardToOverview(d) {
  if (!d) return { error: 'dashboard_empty' };
  const bk = d.bdap_kpi;
  const anac = d.anac;
  return {
    anagrafica: d.anagrafica,
    kpi: {
      popolazione: d.demografia?.popolazione_totale ?? null,
      contratti: anac ? {
        count:             anac.count,
        importo_totale:    anac.importo_totale,
        importo_medio:     anac.count > 0 ? Math.round(anac.importo_totale / anac.count) : 0,
        distinct_cpv:      anac.distinct_cpv,
        first_award_date:  anac.first_award_date,
        last_award_date:   anac.last_award_date,
        top_cpv:           anac.top_cpv,
        cpv:               anac.cpv || [],
        buyer_name:        anac.buyer_name,
      } : null,
      opere: bk ? {
        count:            bk.totale?.count,
        costo_lavori_eff: bk.totale?.costo_lavori_eff,
        per_stato:        bk.per_stato,
        top_settori:      bk.top_settori,
        finanz: {
          statali:   bk.totale?.finanz_statali   || 0,
          europei:   bk.totale?.finanz_europei   || 0,
          enti_terr: bk.totale?.finanz_enti_terr || 0,
          privati:   bk.totale?.finanz_privati   || 0,
          altri:     bk.totale?.finanz_altri     || 0,
        },
      } : null,
      siope: d.siope ? (() => {
        // SIOPE schema v0.2.0: campi top-level sono dentro per_anno[anno_default].
        // Backward-compat con v0.1.0: se totale_anno esiste al top, usalo direttamente.
        if (d.siope.per_anno && d.siope.anno_default != null) {
          const blk = d.siope.per_anno[String(d.siope.anno_default)] || {};
          return { n_voci: blk.n_voci, totale_anno: blk.totale_anno };
        }
        return { n_voci: d.siope.n_voci, totale_anno: d.siope.totale_anno };
      })() : null,
      scuole: d.scuole,  // pass-through completo per renderScuoleTab
      veicoli: d.veicoli,  // pass-through completo per renderVeicoliTab
      redditi: d.redditi,  // pass-through completo per renderRedditiTab
      immobili_pa: d.immobili_pa,  // pass-through completo per renderImmobiliPaTab
      sanita_mds: d.sanita_mds,    // pass-through completo per renderSanitaTab
      anncsu: d.anncsu,  // pass-through completo per renderAnncsuTab
      censimento: d.censimento,  // pass-through completo per renderCensimentoTab
      pun: d.pun,  // pass-through completo per renderPunTab
      agcom_bbmap: d.agcom_bbmap,  // pass-through completo per renderBandaLargaTab
      carburanti: d.carburanti,    // pass-through completo per renderCarburantiTab
      runts: d.runts,    // pass-through completo per renderRuntsTab
      asia: d.asia,      // pass-through completo per renderAsiaTab
      pendolarismo: d.pendolarismo,  // pass-through completo per renderPendolarismoTab
      beni_culturali: d.beni_culturali,  // pass-through completo per renderBeniCulturaliTab (25a fonte MiC ArCo)
      // Pass-through aggiuntivi (servono alla Panoramica home per i KPI di sintesi):
      profilo: d.profilo,
      turismo: d.turismo,
      pnrr: d.pnrr,
      territorio: d.territorio,
      aria: d.aria,
      meteo_italiameteo: d.kpi_summary?.meteo_italiameteo || null,
    },
  };
}

/**
 * Popola le cache di tutti i tab loaders con i dati del dashboard shard.
 * In questo modo cliccando un tab non parte una nuova chiamata MCP.
 */
function populateCachesFromDashboard(istat, d) {
  if (!d) return;
  if (d.demografia) {
    window.__demografiaCache = window.__demografiaCache || {};
    window.__demografiaCache[istat] = d.demografia;
  }
  if (d.profilo) {
    window.__profiloCache = window.__profiloCache || {};
    window.__profiloCache[istat] = d.profilo;
  }
  if (d.turismo) {
    window.__turismoCache = window.__turismoCache || {};
    window.__turismoCache[istat] = d.turismo;
  }
  if (d.pnrr) {
    window.__pnrrCache = window.__pnrrCache || {};
    window.__pnrrCache[istat] = d.pnrr;
  }
  if (d.territorio) {
    window.__territorioCache = window.__territorioCache || {};
    window.__territorioCache[istat] = d.territorio;
  }
  // Aria: popola cache e aggiorna subito il badge della tabbar
  // (fix spinner che gira finché non si clicca il tab)
  {
    const span = document.querySelector('[data-tab-aria-n]');
    if (d.aria) {
      window.__ariaCache = window.__ariaCache || {};
      window.__ariaCache[istat] = d.aria;
      if (span) span.textContent = d.aria.n_stazioni != null ? d.aria.n_stazioni : '—';
    } else {
      if (span) span.textContent = '0';
    }
  }
  window.__meteoData = d.kpi_summary?.meteo_italiameteo || null;
  if (d.opere) {
    // Pre-popoliamo la cache del tab Opere con la sezione 'opere' dello shard
    // A1 unified (comune_dashboard). Il loader loadOpereDettaglio() legge
    // SOLO dalla cache: il tool comune_opere_dettaglio e' stato deprecato
    // perche' i dati sono gia' tutti dentro comune_dashboard.opere.
    window.__opereDettaglioCache = window.__opereDettaglioCache || {};
    window.__opereDettaglioCache[istat] = d.opere;
    // __opereData viene usato da renderOpereChart che legge .finanz.
    // Lo shard d.opere contiene la lista progetti ma NON i totali finanziamenti
    // (quelli sono in d.bdap_kpi.totale.finanz_*). Componiamo qui un oggetto
    // con il campo finanz attinto dalla sorgente giusta.
    const bk = d.bdap_kpi;
    window.__opereData = Object.assign({}, d.opere, {
      finanz: {
        statali:   bk?.totale?.finanz_statali   || 0,
        europei:   bk?.totale?.finanz_europei   || 0,
        enti_terr: bk?.totale?.finanz_enti_terr || 0,
        privati:   bk?.totale?.finanz_privati   || 0,
        altri:     bk?.totale?.finanz_altri     || 0,
      },
    });
    window.__opereChartRendered = false;
  }
  if (d.veicoli) {
    window.__veicoliData = d.veicoli;
    window.__veicoliChartRendered = false;
  }
  if (d.siope) {
    // Il loader del tab Spese si aspetta lo schema legacy con campi al top
    // (totale_anno, voci, mesi_disponibili, n_voci, ente_siope, popolazione,
    // parziale, ultimo_mese) + data.anagrafica per regione/CF.
    // Lo shard SIOPE pre-calcolato in v0.2.0 ha tutto dentro per_anno[<anno>];
    // in v0.1.0 era solo top-level (un solo anno).
    const a = d.anagrafica || {};
    const anag = {
      istat_code:     a.istat_code,
      denominazione:  a.denominazione,
      regione:        a.regione,
      codice_fiscale: a.codice_fiscale,
    };

    window.__speseCache = window.__speseCache || {};
    window.__speseCache[istat] = window.__speseCache[istat] || {};
    const cache = window.__speseCache[istat];

    if (d.siope.per_anno && d.siope.anno_default != null) {
      // v0.2.0: itera su tutti gli anni disponibili nello shard
      const anniDisp = Array.isArray(d.siope.anni_disponibili)
        ? d.siope.anni_disponibili.slice()
        : Object.keys(d.siope.per_anno).map(s => parseInt(s, 10));
      anniDisp.sort((x, y) => x - y);
      for (const anno of anniDisp) {
        const yb = d.siope.per_anno[String(anno)];
        if (!yb) continue;
        cache[anno] = Object.assign({}, yb, { anagrafica: anag });
      }
      cache.__anni_disponibili = anniDisp;
      cache.__anno_default = d.siope.anno_default;
    } else if (d.siope.totale_anno != null) {
      // v0.1.0 fallback: un solo anno top-level
      const anno = d.siope.anno || 2025;
      cache[anno] = Object.assign({}, d.siope, { anagrafica: anag });
      cache.__anni_disponibili = [anno];
      cache.__anno_default = anno;
    }
  }
}

/**
 * Aggiorna i 5 badge nelle pillole dei tab leggendo dai dati gia\' in chiavi
 * del dashboard shard. Sostituisce i 5 prefetch* legacy.
 */
function updateTabBadgesFromDashboard(d) {
  if (!d) return;
  const setBadge = (sel, val) => {
    const span = document.querySelector(sel);
    if (span) span.textContent = val ?? '\u2014';
  };
  // Profilo: % laureati
  const ter = d.profilo?.istruzione?.terziario_pct;
  setBadge('[data-tab-profilo-pct]', ter != null ? (ter + '% laur.') : null);
  // Turismo: indice turisticita
  const idx = d.turismo?.capacita_comune?.indice_turisticita_per_100ab;
  setBadge('[data-tab-turismo-idx]', idx != null ? idx.toString() : null);
  // PNRR: # progetti
  const npn = d.pnrr?.kpi?.n_progetti;
  setBadge('[data-tab-pnrr-count]', npn != null ? fmtNum(npn) : (d._missing && d._missing.indexOf('pnrr') >= 0 ? '0' : null));
  // Territorio: % suolo consumato
  const pct = d.territorio?.kpi?.suolo_consumato_2024_pct;
  setBadge('[data-tab-territorio-pct]', pct != null ? (pct.toFixed(1) + '%') : null);
  // SIOPE: # voci di spesa (v0.2.0: dentro per_anno[anno_default]; v0.1.0: top-level)
  let nv = null;
  if (d.siope) {
    if (d.siope.per_anno && d.siope.anno_default != null) {
      nv = d.siope.per_anno[String(d.siope.anno_default)]?.n_voci ?? null;
    } else {
      nv = d.siope.n_voci ?? null;
    }
  }
  setBadge('[data-tab-spese-count]', nv != null ? fmtNum(nv) : null);
}

`;
      zip.file('README.txt', readme);
      // 3-4. LICENSE.txt + METADATI.csv (file statici da frontend/)
      const [licenseText, metadatiText] = await Promise.all([
        fetch('/LICENSE.txt').then(r => r.ok ? r.text() : Promise.reject(new Error('LICENSE.txt non raggiungibile'))),
        fetch('/METADATI.csv').then(r => r.ok ? r.text() : Promise.reject(new Error('METADATI.csv non raggiungibile')))
      ]);
      zip.file('LICENSE.txt', licenseText);
      zip.file('METADATI.csv', '\ufeff' + metadatiText.replaceAll('{{SITE_URL}}', window.location.origin));
      // 5. CSV per-sezione (strategia B + split nodi profondi) + TXT per dati campionati
      try {
        const ORIGIN = window.location.origin;
        // nodi campionati/non-nel-json -> NON CSV, ma TXT con link al completo esposto
        // I nodi con 'tot' sono campionati SOLO se nel JSON la lista e' piu' corta del totale (valutato per-comune).
        // 'tot' = percorso del KPI col totale reale; se assente -> sempre campionato (dettaglio non nel JSON).
        const CAMPIONATI = {
          'anncsu.punti':        { file: 'anncsu',         tot: ['kpi','n_civici'],  url: `/data/anncsu_full/${istat}.json`,            desc: 'tutti i civici e le strade (ANNCSU - Agenzia delle Entrate + ISTAT)' },
          'immobili_pa.punti':   { file: 'immobili_pa',    tot: ['kpi','n_totale'],  url: `/data/immobili_pa/${istat}.json`,            desc: 'tutti gli immobili pubblici (MEF - Beni Immobili Pubblici)' },
          'beni_culturali.luoghi':{ file: 'beni_culturali', tot: ['kpi','n_totale'], url: `/data/beni_culturali_full/${istat}.json`,    desc: 'tutti i beni culturali catalogati (MiC)' },
          'asia.ateco_dettaglio':{ file: 'asia_ateco',     url: `/data/asia/${istat}.json`,                   desc: 'il dettaglio completo per settore ATECO e classe dimensionale (ISTAT ASIA)' },
        };
        // ritorna true se il nodo va trattato come campionato per QUESTO comune
        const isCampionato = (nodoKey) => {
          const info = CAMPIONATI[nodoKey]; if (!info) return false;
          if (!info.tot) return true;  // dettaglio mai nel JSON -> sempre .txt
          const [sz, ky] = nodoKey.split('.');
          const arr = dashboard[sz] && dashboard[sz][ky];
          let tot = dashboard[sz]; for (const t of info.tot) tot = tot && tot[t];
          if (!Array.isArray(arr) || typeof tot !== 'number') return false;
          return arr.length < tot;  // troncato solo se piu' corto del totale
        };
        // dataset di dettaglio non presenti nel JSON -> TXT dedicati
        const EXTRA_TXT = {
          'catasto':    { url: `/data/catasto_full/${istat}_ple.geojson.gz`, desc: 'le particelle catastali complete in formato GeoJSON compresso (Agenzia delle Entrate)' },
          'censimento_sezioni': { url: `/data/censimento_full/${istat}.geojson`, desc: 'le geometrie e le 119 variabili di tutte le sezioni di censimento (ISTAT 2021)' },
        };

        const csvEscape = (v) => {
          if (v === null || v === undefined) return '';
          let str = (typeof v === 'object') ? JSON.stringify(v) : String(v);
          if (/[",\n\r]/.test(str)) str = '"' + str.replace(/"/g, '""') + '"';
          return str;
        };
        const rowsToCsv = (rows) => {
          const cols = [];
          for (const r of rows) for (const c of Object.keys(r)) if (!cols.includes(c)) cols.push(c);
          const out = [cols.map(csvEscape).join(',')];
          for (const r of rows) out.push(cols.map(c => csvEscape(r[c])).join(','));
          return '\ufeff' + out.join('\r\n');  // BOM UTF-8 per Excel
        };
        const flattenRecord = (rec, prefix) => {
          const out = {};
          for (const [k, val] of Object.entries(rec)) {
            const key = (prefix || '') + k;
            if (val && typeof val === 'object' && !Array.isArray(val)) Object.assign(out, flattenRecord(val, key + '.'));
            else if (Array.isArray(val)) out[key] = JSON.stringify(val);
            else out[key] = val;
          }
          return out;
        };
        const depth = (v) => (v && typeof v === 'object' && !Array.isArray(v) && Object.keys(v).length)
          ? 1 + Math.max(0, ...Object.values(v).map(depth)) : 0;
        const isListOfObjs = (v) => Array.isArray(v) && v.length && v.every(x => x && typeof x === 'object' && !Array.isArray(x));
        const longRows = (node, keyNames) => {
          const rows = [];
          const walk = (d, keys) => {
            if (d && typeof d === 'object' && !Array.isArray(d)) {
              const vals = Object.values(d);
              if (vals.length && vals.every(x => !(x && typeof x === 'object' && !Array.isArray(x)))) {
                const row = {};
                keys.forEach((kv, i) => row[keyNames[i] || ('liv' + (i+1))] = kv);
                for (const [k, v] of Object.entries(d)) row[k] = (v && typeof v === 'object') ? JSON.stringify(v) : v;
                rows.push(row);
              } else for (const [k, v] of Object.entries(d)) walk(v, keys.concat(k));
            } else {
              const row = {};
              keys.forEach((kv, i) => row[keyNames[i] || ('liv' + (i+1))] = kv);
              row.valore = d; rows.push(row);
            }
          };
          walk(node, []);
          return rows;
        };

        const csvFiles = [];  // {name, content}
        const emitNode = (sez, key, v) => {
          const base = key ? `${sez}_${key}` : sez;
          if (isCampionato(`${sez}.${key}`)) return;  // skip solo se davvero troncato per questo comune
          if (isListOfObjs(v)) csvFiles.push({ name: `${base}.csv`, rows: v.map(x => flattenRecord(x, '')) });
          else if (Array.isArray(v)) csvFiles.push({ name: `${base}.csv`, rows: v.map(x => ({ [key || 'valore']: x })) });
          else if (v && typeof v === 'object') {
            const vals = Object.values(v);
            const isDod = vals.length && vals.every(x => x && typeof x === 'object' && !Array.isArray(x));
            if (isDod && depth(v) >= 3) {
              for (const [ck, cv] of Object.entries(v)) {
                if (depth(cv) >= 2) csvFiles.push({ name: `${base}_${ck}.csv`, rows: longRows(cv, ['liv1','liv2','liv3']) });
                else if (cv && typeof cv === 'object') csvFiles.push({ name: `${base}_${ck}.csv`, rows: Object.entries(cv).map(([k2,v2]) => (v2 && typeof v2==='object') ? {chiave:k2, ...flattenRecord(v2,'')} : {chiave:k2, valore:v2}) });
              }
            } else if (isDod) {
              csvFiles.push({ name: `${base}.csv`, rows: Object.entries(v).map(([ck, cv]) => ({ chiave: ck, ...flattenRecord(cv, '') })) });
            } else {
              csvFiles.push({ name: `${base}.csv`, rows: Object.entries(v).map(([k, x]) => ({ chiave: k, valore: (x && typeof x === 'object') ? JSON.stringify(x) : x })) });
            }
          }
        };

        for (const [sez, node] of Object.entries(dashboard)) {
          if (sez.startsWith('_')) continue;
          if (sez === 'kpi_summary' && node && typeof node === 'object') {
            const rows = [];
            for (const [s, m] of Object.entries(node)) if (m && typeof m === 'object')
              for (const [mm, val] of Object.entries(m)) rows.push({ sezione: s, metrica: mm, valore: (val && typeof val==='object') ? JSON.stringify(val) : val });
            if (rows.length) csvFiles.push({ name: 'kpi_summary.csv', rows });
            continue;
          }
          if (node && typeof node === 'object' && !Array.isArray(node)) {
            const scal = {};
            for (const [k, v] of Object.entries(node)) {
              if (k.startsWith('_')) continue;
              if (v && typeof v === 'object') emitNode(sez, k, v);
              else scal[k] = v;
            }
            if (Object.keys(scal).length) csvFiles.unshift({ name: `${sez}_sintesi.csv`, rows: Object.entries(scal).map(([k,v]) => ({ chiave: k, valore: v })) });
          } else if (isListOfObjs(node)) {
            csvFiles.push({ name: `${sez}.csv`, rows: node.map(x => flattenRecord(x, '')) });
          }
        }

        // scrivo i CSV in sottocartella csv/
        for (const cf of csvFiles) {
          if (cf.rows && cf.rows.length) zip.file(`csv/${cf.name}`, rowsToCsv(cf.rows));
        }

        // TXT per i dati campionati / di dettaglio
        const txtLines = [];
        const mkTxt = (titolo, desc, url) =>
          `CRUSCOTTO ITALIA - Dati di dettaglio\n` +
          `====================================\n\n` +
          `${titolo}\n\n` +
          `Questo dato non e' incluso nei CSV perche' nell'archivio dati-completi.json\n` +
          `e' presente solo un estratto. Il dato COMPLETO contiene ${desc}.\n\n` +
          `SCARICA IL FILE COMPLETO:\n${ORIGIN}${url}\n\n` +
          `Il file e' liberamente scaricabile (licenza CC-BY 4.0, vedi LICENSE.txt).\n`;
        for (const [nodo, info] of Object.entries(CAMPIONATI)) {
          if (isCampionato(nodo)) zip.file(`dati-dettaglio/${info.file}_COME_SCARICARE.txt`, mkTxt(nodo, info.desc, info.url));
        }
        for (const [nome, info] of Object.entries(EXTRA_TXT)) {
          zip.file(`dati-dettaglio/${nome}_COME_SCARICARE.txt`, mkTxt(nome, info.desc, info.url));
        }
      } catch (e) { console.error('Generazione CSV/TXT fallita:', e); }

      // Genera ZIP e scarica
      const blob = await zip.generateAsync({
        type: 'blob',
        compression: 'DEFLATE',
        compressionOptions: { level: 6 }
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (err) {
      console.error('Download ZIP fallito:', err);
      alert('Errore nella generazione dello ZIP: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.querySelector('.label').textContent = originalLabel;
    }
  });
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const istat = params.get('istat');
  if (!istat) {
    document.getElementById('comune-content').innerHTML = `
      <section class="comune-hero"><div class="wrap">
        <div class="comune-eyebrow">Mancante</div>
        <h1 class="comune-title">Nessun <em>comune</em> selezionato.</h1>
        <p style="margin-top:24px;font-family:var(--serif);font-size:18px">
          Torna alla <a href="/">home</a> per cercare un comune.
        </p>
      </div></section>`;
    return;
  }
  if (!/^\d{6}$/.test(istat)) {
    document.getElementById('comune-content').innerHTML = `
      <section class="comune-hero"><div class="wrap">
        <div class="comune-eyebrow">Codice non valido</div>
        <h1 class="comune-title">Codice <em>comune</em> non valido.</h1>
        <p style="margin-top:24px;font-family:var(--serif);font-size:18px">
          Il codice ISTAT deve essere di 6 cifre. Torna alla <a href="/">home</a> per cercare un comune.
        </p>
      </div></section>`;
    return;
  }
  try {
    // A1: una sola chiamata MCP carica TUTTI i dati per tutti i tab.
    // Lo shard dashboard contiene anagrafica + 7 sezioni + bdap_kpi + anac,
    // quindi:
    //   - renderComune() riceve un oggetto adattato allo schema legacy
    //   - le 7 cache window.__<X>Cache vengono pre-popolate
    //   - i 5 badge delle pillole vengono aggiornati subito
    //   - i tab loaders trovano cache hit e non chiamano MCP
    // A1: una chiamata MCP per i dati del comune in parallelo con il
    // fetch del lookup nomi ISTAT (~195KB cachato dal browser, blocca solo
    // il primo accesso; le pagine successive lo trovano cached).
    const [dashboard] = await Promise.all([
      mcpCall('comune_dashboard', { istat_code: istat }),
      window.__istatNames ? Promise.resolve(null) : fetch('/istat-names.json')
        .then(r => r.ok ? r.json() : null)
        .then(names => { if (names) window.__istatNames = names; })
        .catch(() => { window.__istatNames = window.__istatNames || {}; }),
      window.__istatCoords ? Promise.resolve(null) : fetch('/data/istat-coords.json')
        .then(r => r.ok ? r.json() : null)
        .then(coords => { if (coords) window.__istatCoords = coords; })
        .catch(() => { window.__istatCoords = window.__istatCoords || {}; }),
    ]);
    if (dashboard?.error) {
      throw new Error(dashboard.error);
    }
    renderComune(adaptDashboardToOverview(dashboard));
    populateCachesFromDashboard(istat, dashboard);
    updateTabBadgesFromDashboard(dashboard);
    setupTabsScrollHint();
    bindTabSwitching();
    enhanceTabsA11y();
    bindScuoleFilters();
    setupDownloadButton(istat, dashboard);
  } catch (err) {
    console.error('init() comune_dashboard:', err);
    document.getElementById('comune-content').innerHTML = `
      <section class="comune-hero"><div class="wrap">
        <div class="comune-eyebrow">Errore</div>
        <h1 class="comune-title"><em>Servizio</em> non raggiungibile.</h1>
        <p style="margin-top:16px;font-family:var(--serif);font-size:18px">
          Si è verificato un problema nel caricamento dei dati del comune. Riprova più tardi o torna alla <a href="/">home</a>.
        </p>
        <p style="margin-top:24px"><a href="/">← Torna alla home</a></p>
      </div></section>`;
  }
}

// Scroll hint frecce tab: aggiunge has-scroll-left/right alla .tabs-bar
// in base alla posizione di scroll della .tabs (orizzontale).
function setupTabsScrollHint() {
  const bar  = document.querySelector('.tabs-bar');
  const tabs = bar?.querySelector('.tabs');
  if (!bar || !tabs) return;
  function update() {
    const max = tabs.scrollWidth - tabs.clientWidth;
    const x   = tabs.scrollLeft;
    bar.classList.toggle('has-scroll-left',  x > 4);
    bar.classList.toggle('has-scroll-right', x < max - 4);
  }
  // Click su freccia: scroll programmatico di ~70% della larghezza visibile
  const left  = bar.querySelector('.tabs-scroll-hint.left');
  const right = bar.querySelector('.tabs-scroll-hint.right');
  if (left)  left .addEventListener('click', () => tabs.scrollBy({ left: -tabs.clientWidth * 0.7, behavior: 'smooth' }));
  if (right) right.addEventListener('click', () => tabs.scrollBy({ left:  tabs.clientWidth * 0.7, behavior: 'smooth' }));
  tabs.addEventListener('scroll', update, { passive: true });
  window.addEventListener('resize', update);
  // primo update dopo il render iniziale
  setTimeout(update, 0);
  // re-update quando renderComune ha appena disegnato i tab
  new MutationObserver(update).observe(bar, { childList: true, subtree: true });
}

function initPendolarismoMap(d) {
  if (typeof L === 'undefined' || typeof L.canvasFlowmapLayer !== 'function') {
    console.warn('CanvasFlowmapLayer non caricato, skip mappa pendolarismo');
    return;
  }
  if (!d || !d.kpi) return;

  const mapEl = document.getElementById('pendolarismo-map');
  if (!mapEl) return;

  const coords = window.__istatCoords || {};
  const names = window.__istatNames || {};
  const k = d.kpi;
  const istatSelf = new URLSearchParams(window.location.search).get('istat');
  const selfCoord = coords[istatSelf];

  if (!selfCoord) {
    mapEl.innerHTML = '<div style="padding:24px;text-align:center;color:#5C6F82;">Coordinate del comune non disponibili: mappa non disponibile.</div>';
    return;
  }

  const selfName = names[istatSelf] || istatSelf;

  // Costruisco le 2 FeatureCollection (una per uscenti, una per entranti)
  // Schema FlowmapLayer: ogni Feature ha geometry origine + properties con dest
  function makeFeatures(items, originIstat, originCoord, originName, kind) {
    const features = [];
    items.forEach((it) => {
      const dc = coords[it.istat];
      if (!dc) return;
      const dn = names[it.istat] || it.istat;
      features.push({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [originCoord[1], originCoord[0]] },  // [lon, lat]
        properties: {
          origin_id: originIstat,
          origin_name: originName,
          origin_lat: originCoord[0],
          origin_lon: originCoord[1],
          destination_id: it.istat,
          destination_name: dn,
          destination_lat: dc[0],
          destination_lon: dc[1],
          count: it.count,
          kind: kind,  // 'out' (uscenti) o 'in' (entranti)
        },
      });
    });
    return { type: 'FeatureCollection', features };
  }

  const dests = (k.top_destinazioni || []).slice(0, 10);
  const origs = (k.top_origini || []).slice(0, 10);

  // Per le destinazioni: origine = comune corrente, dest = satellite
  const fcDest = makeFeatures(dests, istatSelf, selfCoord, selfName, 'out');
  // Per le origini: la "origine" del flusso è il satellite e la "destinazione" è il comune corrente
  const fcOrig = { type: 'FeatureCollection', features: [] };
  fcOrig.features = origs.flatMap((it) => {
    const dc = coords[it.istat];
    if (!dc) return [];
    const dn = names[it.istat] || it.istat;
    return [{
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [dc[1], dc[0]] },
      properties: {
        origin_id: it.istat,
        origin_name: dn,
        origin_lat: dc[0],
        origin_lon: dc[1],
        destination_id: istatSelf,
        destination_name: selfName,
        destination_lat: selfCoord[0],
        destination_lon: selfCoord[1],
        count: it.count,
        kind: 'in',
      },
    }];
  });

  // Inizializza mappa
  const map = L.map(mapEl, {
    zoomControl: true,
    scrollWheelZoom: false,
    attributionControl: true,
  }).setView(selfCoord, 9);
  // A11y/UX: scroll-wheel + pinch trackpad abilitati solo dopo click.
  map.on('focus', () => map.scrollWheelZoom.enable());
  map.on('blur',  () => map.scrollWheelZoom.disable());

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors',
  }).addTo(map);

  const fieldIds = {
    originUniqueIdField: 'origin_id',
    originGeometry: { x: 'origin_lon', y: 'origin_lat' },
    destinationUniqueIdField: 'destination_id',
    destinationGeometry: { x: 'destination_lon', y: 'destination_lat' },
  };

  // Layer destinazioni (uscenti, blu)
  const destLayer = L.canvasFlowmapLayer(fcDest, {
    originAndDestinationFieldIds: fieldIds,
    pathDisplayMode: 'all',
    animationStarted: true,
    animationEasingFamily: 'Cubic',
    animationEasingType: 'InOut',
    animationDuration: 2500,
    canvasBezierStyle: {
      type: 'simple',
      symbol: { strokeStyle: '#0066CC', lineWidth: 1.5, lineCap: 'round', shadowColor: '#0066CC', shadowBlur: 2 },
    },
    animatedCanvasBezierStyle: {
      type: 'simple',
      symbol: { strokeStyle: '#0066CC', lineWidth: 3, lineCap: 'round', lineDashOffsetSize: 4, shadowColor: '#0066CC', shadowBlur: 2 },
    },
    style: function (geoJsonFeature) {
      return { radius: 5, color: '#0066CC', fillColor: '#0066CC', fillOpacity: 0.85, weight: 1.5 };
    },
  });

  // Layer origini (entranti, arancio)
  const origLayer = L.canvasFlowmapLayer(fcOrig, {
    originAndDestinationFieldIds: fieldIds,
    pathDisplayMode: 'all',
    animationStarted: true,
    animationEasingFamily: 'Cubic',
    animationEasingType: 'InOut',
    animationDuration: 2500,
    canvasBezierStyle: {
      type: 'simple',
      symbol: { strokeStyle: '#E89400', lineWidth: 1.5, lineCap: 'round', shadowColor: '#E89400', shadowBlur: 2 },
    },
    animatedCanvasBezierStyle: {
      type: 'simple',
      symbol: { strokeStyle: '#E89400', lineWidth: 3, lineCap: 'round', lineDashOffsetSize: 4, shadowColor: '#E89400', shadowBlur: 2 },
    },
    style: function (geoJsonFeature) {
      return { radius: 5, color: '#E89400', fillColor: '#E89400', fillOpacity: 0.85, weight: 1.5 };
    },
  });

  destLayer.addTo(map);
  origLayer.addTo(map);

  // Click sui marker (origin o destination): mostra popup col nome + numero pendolari
  function handleFlowmapClick(e) {
    const p = e.layer && e.layer.feature ? e.layer.feature.properties : null;
    if (!p) {
      return;
    }
    // Distingo il tipo di feature da p.kind (settato in fase di build delle
    // FeatureCollection): 'out' = marker su comune destinazione (uscenti);
    //                    'in'  = marker su comune origine (entranti).
    // BUG fix 2026-05-21: prima si usava e.isOriginFeature che non viene mai
    // settato da Leaflet → tutti i click entravano nel ramo else con popup
    // che mostrava i KPI del comune corrente. Ora usiamo p.kind direttamente.
    let html;
    if (p.kind === 'out') {
      // Marker su comune DESTINAZIONE (uscenti da Taranto verso X)
      html = '<b>' + p.destination_name + '</b><br>' + p.destination_id + '<br>' +
             p.count.toLocaleString('it-IT') + ' pendolari verso ' + p.destination_name;
    } else {
      // Marker su comune ORIGINE (entranti a Taranto da X), p.kind === 'in'
      html = '<b>' + p.origin_name + '</b><br>' + p.origin_id + '<br>' +
             p.count.toLocaleString('it-IT') + ' pendolari da ' + p.origin_name;
    }
    // Apro popup direttamente sul layer (CircleMarker) cliccato — più affidabile
    if (e.layer && e.layer.bindPopup) {
      e.layer.bindPopup(html).openPopup();
    } else {
      L.popup({offset: [0, -6]}).setLatLng(e.latlng || e.layer._latlng).setContent(html).openOn(map);
    }
  }
  destLayer.on('click', handleFlowmapClick);
  origLayer.on('click', handleFlowmapClick);

  // Marker comune origine al centro (cerchio rosso evidenziato sopra tutto)
  L.circleMarker(selfCoord, {
    radius: 9, color: '#C9302C', fillColor: '#C9302C', fillOpacity: 0.95, weight: 2.5,
  }).addTo(map).bindPopup('<b>' + selfName + '</b><br>' + istatSelf + '<br>Saldo netto: <b>' + (k.saldo_netto >= 0 ? '+' : '') + k.saldo_netto.toLocaleString('it-IT') + '</b>');

  // Fit bounds su tutti i marker
  const allBounds = [selfCoord];
  fcDest.features.forEach(f => allBounds.push([f.properties.destination_lat, f.properties.destination_lon]));
  fcOrig.features.forEach(f => allBounds.push([f.properties.origin_lat, f.properties.origin_lon]));
  if (allBounds.length > 1) {
    map.fitBounds(L.latLngBounds(allBounds), { padding: [30, 30] });
  }

  // Toggle layer dai bottoni
  document.querySelectorAll('#pendolarismo-map-controls .pendolarismo-map-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      const which = btn.dataset.toggle;
      const layer = which === 'dest' ? destLayer : origLayer;
      const isActive = btn.getAttribute('aria-pressed') === 'true';
      if (isActive) {
        map.removeLayer(layer);
        btn.setAttribute('aria-pressed', 'false');
        btn.classList.remove('active');
      } else {
        map.addLayer(layer);
        btn.setAttribute('aria-pressed', 'true');
        btn.classList.add('active');
      }
    });
  });
}

        <a href="https://creativecommons.org/licenses/by/3.0/it/" target="_blank" rel="noopener">CC BY 3.0 IT</a>.
        I codici ISTAT mostrati a fianco del nome comune sono i ProCom 6-digit.
        Coordinate da OpenStreetMap (centroide bounding box comune).
      </p>

function initRunts(d) {
  if (!d || !d.kpi || d.kpi.n_totale === 0) return;
  if (typeof Chart === 'undefined') {
    console.warn('Chart.js non disponibile per initRunts');
    return;
  }

  // ---------- Chart 1: bar orizzontale per mix sezione (count desc) ----------
  const canvasSez = document.getElementById('runts-chart-sezione');
  if (canvasSez) {
    const mix = d.kpi.mix_sezione || {};
    const entries = Object.entries(mix).sort((a, b) => b[1] - a[1]);
    const labels = entries.map(([s]) => s);
    const values = entries.map(([, n]) => n);
    const colors = entries.map(([s]) => (RUNTS_SEZIONI[s] || {}).color || '#5C6F82');
    const tooltips = entries.map(([s]) => (RUNTS_SEZIONI[s] || {}).full || s);
    new Chart(canvasSez.getContext('2d'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: colors,
          borderWidth: 0,
          maxBarThickness: 36,
        }],
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: (items) => tooltips[items[0].dataIndex],
              label: (item) => {
                const total = values.reduce((s, n) => s + n, 0);
                const pct = total > 0 ? (100 * item.parsed.x / total).toFixed(1) : '0';
                return `${item.parsed.x} enti (${pct}%)`;
              },
            },
          },
        },
        scales: {
          x: { beginAtZero: true, ticks: { precision: 0 } },
          y: { ticks: { font: { size: 13, weight: 'bold' } } },
        },
      },
    });
  }

  // ---------- Chart 2: line iscrizioni per anno ----------
  const canvasIsc = document.getElementById('runts-chart-iscrizioni');
  if (canvasIsc) {
    const isc = d.kpi.iscrizioni_per_anno || {};
    const years = Object.keys(isc).sort();
    const values = years.map(y => isc[y]);
    new Chart(canvasIsc.getContext('2d'), {
      type: 'line',
      data: {
        labels: years,
        datasets: [{
          data: values,
          borderColor: '#0066CC',
          backgroundColor: 'rgba(0, 102, 204, 0.12)',
          fill: true,
          tension: 0.25,
          pointRadius: 4,
          pointBackgroundColor: '#0066CC',
          borderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (item) => `${item.parsed.y} iscrizioni`,
            },
          },
        },
        scales: {
          x: { ticks: { font: { size: 12 } } },
          y: { beginAtZero: true, ticks: { precision: 0 } },
        },
      },
    });
  }

  // ---------- Tabella paginata ----------
  const enti = d.enti || [];
  const PAGE = 50;
  let currentPage = 1;
  let currentFilter = 'ALL';
  let currentSearch = '';
  const tbody = document.getElementById('runts-table-tbody');
  const pageInfo = document.getElementById('runts-page-info');
  const prevBtn = document.getElementById('runts-prev');
  const nextBtn = document.getElementById('runts-next');
  const searchInput = document.getElementById('runts-search');

  function getFiltered() {
    const s = currentSearch.trim().toLowerCase();
    return enti.filter(e => {
      if (currentFilter !== 'ALL' && e.sez !== currentFilter) return false;
      if (s) {
        const denom = (e.denom || '').toLowerCase();
        const cf = (e.cf || '').toLowerCase();
        if (!denom.includes(s) && !cf.includes(s)) return false;
      }
      return true;
    });
  }

  function escHtml(v) {
    return String(v || '').replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render() {
    const filtered = getFiltered();
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * PAGE;
    const slice = filtered.slice(start, start + PAGE);
    if (slice.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="runts-noresult">Nessun ente trovato${currentSearch || currentFilter !== 'ALL' ? ' per i filtri correnti' : ''}.</td></tr>`;
    } else {
      tbody.innerHTML = slice.map(e => {
        const sez = RUNTS_SEZIONI[e.sez];
        const sezBadge = sez
          ? `<span class="runts-sez-badge" style="background:${sez.color}" title="${sez.full}">${sez.lab}</span>`
          : escHtml(e.sez);
        return `<tr>
          <td><strong>${escHtml(e.denom)}</strong></td>
          <td>${sezBadge}</td>
          <td><code class="runts-cf">${escHtml(e.cf)}</code></td>
          <td>${escHtml(e.rapp)}</td>
          <td>${e.x1000 ? '<span class="runts-yes" aria-label="iscritto al 5x1000">✓</span>' : '<span class="runts-no" aria-label="non iscritto">—</span>'}</td>
          <td>${e.rete ? '<span class="runts-yes" aria-label="aderente a rete">✓</span>' : '<span class="runts-no" aria-label="non aderente">—</span>'}</td>
          <td><time datetime="${escHtml(e.data_iscr)}">${escHtml(e.data_iscr)}</time></td>
        </tr>`;
      }).join('');
    }
    pageInfo.textContent = total > 0
      ? `Pagina ${currentPage} di ${totalPages} · ${fmtNum(total)} ent${total === 1 ? 'e' : 'i'}`
      : 'Nessun risultato';
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
  }

  prevBtn.addEventListener('click', () => {
    if (currentPage > 1) { currentPage--; render(); }
  });
  nextBtn.addEventListener('click', () => {
    currentPage++; render();
  });
  if (searchInput) {
    let timer;
    searchInput.addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        currentSearch = searchInput.value;
        currentPage = 1;
        render();
      }, 180);
    });
  }
  document.querySelectorAll('.runts-filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.runts-filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.runtsFilter;
      currentPage = 1;
      render();
    });
  });
  render();
}

          <p class="muted asia-chart-legend">
            <span class="asia-legend-dot" style="background:${ASIA_CLASSI.W0_9.color}" aria-hidden="true"></span>${ASIA_CLASSI.W0_9.lab} ·
            <span class="asia-legend-dot" style="background:${ASIA_CLASSI.W10_49.color}" aria-hidden="true"></span>${ASIA_CLASSI.W10_49.lab} ·
            <span class="asia-legend-dot" style="background:${ASIA_CLASSI.W50_249.color}" aria-hidden="true"></span>${ASIA_CLASSI.W50_249.lab} ·
            <span class="asia-legend-dot" style="background:${ASIA_CLASSI.W_GE250.color}" aria-hidden="true"></span>${ASIA_CLASSI.W_GE250.lab}
          </p>
        </div>
      </div>

      <div class="asia-chart-box">
        <h3 class="asia-chart-title">Serie storica unità locali e addetti</h3>
        <div class="asia-chart-container">
          <canvas id="asia-chart-serie" aria-label="Serie storica unità locali e addetti per anno" role="img"></canvas>
        </div>
        <p class="muted asia-chart-legend">
          <span class="asia-legend-dot" style="background:#0066CC" aria-hidden="true"></span>Unità locali (asse sinistro) ·
          <span class="asia-legend-dot" style="background:#E89400" aria-hidden="true"></span>Addetti media annua (asse destro)
        </p>
      </div>

      <details class="asia-details">
        <summary><strong>Dettaglio per settore ATECO e classe dimensionale</strong></summary>
        <p class="muted" style="margin-top:.5rem">
          Ripartizione completa delle UL e degli addetti per ciascuna divisione ATECO
          (2 cifre) e classe dimensionale, per l'anno ${year}.
          Le righe sono ordinate per numero di UL totali decrescente.
        </p>
        <div class="asia-table-wrap">
          <table class="asia-table" id="asia-table-dettaglio"><caption style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">Unità locali e addetti per settore ATECO</caption>
            <thead>
              <tr>
                <th id="asia-h-set" rowspan="2" scope="col">Settore ATECO</th>
                <th id="asia-h-clgrp" colspan="4" scope="colgroup">Unità locali per classe</th>
                <th id="asia-h-totul" rowspan="2" scope="col">Tot. UL</th>
                <th id="asia-h-totadd" rowspan="2" scope="col">Tot. Addetti</th>
              </tr>
              <tr>
                <th id="asia-h-w09" scope="col">${ASIA_CLASSI.W0_9.lab}</th>
                <th id="asia-h-w1049" scope="col">${ASIA_CLASSI.W10_49.lab}</th>
                <th id="asia-h-w50249" scope="col">${ASIA_CLASSI.W50_249.lab}</th>
                <th id="asia-h-wge250" scope="col">${ASIA_CLASSI.W_GE250.lab}</th>
              </tr>
            </thead>
            <tbody id="asia-table-tbody">
              <tr>
                <td headers="asia-h-set"><span class="visually-hidden">In caricamento</span></td>
                <td headers="asia-h-clgrp asia-h-w09"></td>
                <td headers="asia-h-clgrp asia-h-w1049"></td>
                <td headers="asia-h-clgrp asia-h-w50249"></td>
                <td headers="asia-h-clgrp asia-h-wge250"></td>
                <td headers="asia-h-totul"></td>
                <td headers="asia-h-totadd"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </details>

      <p class="muted" style="margin-top:1rem">
        <em>Licenza:</em> CC BY 3.0 IT &middot; Fonte ISTAT &middot; aggiornamento annuale ~Q4
        (latency ~2 anni: nel ${new Date().getFullYear()} l'ultimo anno disponibile è ${year}).
      </p>
    </div>`;
}

function initAsia(d) {
  if (!d || !d.kpi || d.kpi.ul_totali == null || d.kpi.ul_totali === 0) return;
  if (typeof Chart === 'undefined') {
    console.warn('Chart.js non disponibile per initAsia');
    return;
  }

  const year = d._latest_year || 2023;
  const yearKey = String(year);

  // ---------- Chart 1: bar orizzontale top 10 settori per UL ----------
  const canvasSet = document.getElementById('asia-chart-settori');
  if (canvasSet) {
    const top = (d.kpi.top_settori_ul || []).slice(0, 10);
    const labels = top.map(s => s.label);
    const values = top.map(s => s.ul);
    const addetti = top.map(s => s.addetti);
    new Chart(canvasSet.getContext('2d'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: '#0066CC',
          borderWidth: 0,
          maxBarThickness: 28,
        }],
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: (items) => labels[items[0].dataIndex],
              label: (item) => {
                const idx = item.dataIndex;
                return [
                  `${fmtNum(values[idx])} unità locali`,
                  `${fmtNum(addetti[idx])} addetti`,
                ];
              },
            },
          },
        },
        scales: {
          x: { beginAtZero: true, ticks: { precision: 0 } },
          y: { ticks: { font: { size: 12 } } },
        },
      },
    });
  }

  // ---------- Chart 2: doughnut mix classi dimensionali ----------
  const canvasCl = document.getElementById('asia-chart-classi');
  if (canvasCl) {
    const mix = d.kpi.mix_classe_addetti || {};
    const order = ['W0_9', 'W10_49', 'W50_249', 'W_GE250'];
    const labels = order.map(c => ASIA_CLASSI[c].lab);
    const values = order.map(c => mix[c] || 0);
    const colors = order.map(c => ASIA_CLASSI[c].color);
    new Chart(canvasCl.getContext('2d'), {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: colors,
          borderWidth: 2,
          borderColor: '#fff',
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '58%',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (item) => `${item.label}: ${item.parsed.toFixed(2)}% delle UL`,
            },
          },
        },
      },
    });
  }

  // ---------- Chart 3: line serie storica UL + addetti (doppio asse) ----------
  const canvasSer = document.getElementById('asia-chart-serie');
  if (canvasSer) {
    const s = d.serie_storica || {};
    const anni = s.anni || [];
    const ulSerie = s.ul || [];
    const addSerie = s.addetti || [];
    new Chart(canvasSer.getContext('2d'), {
      type: 'line',
      data: {
        labels: anni.map(String),
        datasets: [
          {
            label: 'Unità locali',
            data: ulSerie,
            borderColor: '#0066CC',
            backgroundColor: 'rgba(0, 102, 204, 0.10)',
            fill: false,
            tension: 0.25,
            pointRadius: 4,
            pointBackgroundColor: '#0066CC',
            borderWidth: 2,
            yAxisID: 'yUL',
          },
          {
            label: 'Addetti',
            data: addSerie,
            borderColor: '#E89400',
            backgroundColor: 'rgba(232, 148, 0, 0.10)',
            fill: false,
            tension: 0.25,
            pointRadius: 4,
            pointBackgroundColor: '#E89400',
            borderWidth: 2,
            borderDash: [4, 4],
            yAxisID: 'yADD',
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (item) => {
                const v = item.parsed.y;
                return `${item.dataset.label}: ${fmtNum(v)}`;
              },
            },
          },
        },
        scales: {
          x: { ticks: { font: { size: 12 } } },
          yUL: {
            type: 'linear',
            position: 'left',
            beginAtZero: false,
            title: { display: true, text: 'Unità locali', color: '#0066CC' },
            ticks: { precision: 0, color: '#0066CC' },
          },
          yADD: {
            type: 'linear',
            position: 'right',
            beginAtZero: false,
            title: { display: true, text: 'Addetti', color: '#E89400' },
            ticks: { precision: 0, color: '#E89400' },
            grid: { drawOnChartArea: false },
          },
        },
      },
    });
  }

  // ---------- Tabella dettaglio ATECO × classe (statica, no paginazione) ----------
  const tbody = document.getElementById('asia-table-tbody');
  if (tbody) {
    const detail = (d.ateco_dettaglio || {})[yearKey] || {};
    const rows = Object.entries(detail).map(([code, byClass]) => {
      const get = (c) => byClass?.[c]?.ul || 0;
      const getAdd = (c) => byClass?.[c]?.addetti || 0;
      const ulTot = byClass?.TOTAL?.ul || (get('W0_9') + get('W10_49') + get('W50_249') + get('W_GE250'));
      const addTot = byClass?.TOTAL?.addetti || (getAdd('W0_9') + getAdd('W10_49') + getAdd('W50_249') + getAdd('W_GE250'));
      return {
        code,
        label: (d.kpi.top_settori_ul || []).find(s => s.code === code)?.label
            || (d.kpi.top_settori_addetti || []).find(s => s.code === code)?.label
            || `ATECO ${code}`,
        w0_9: get('W0_9'),
        w10_49: get('W10_49'),
        w50_249: get('W50_249'),
        w_ge250: get('W_GE250'),
        ulTot,
        addTot,
      };
    }).filter(r => r.ulTot > 0).sort((a, b) => b.ulTot - a.ulTot);

    tbody.innerHTML = rows.map(r => `
      <tr>
        <td headers="asia-h-set"><strong>${r.code}</strong> · ${r.label}</td>
        <td class="num" headers="asia-h-clgrp asia-h-w09">${r.w0_9 > 0 ? fmtNum(r.w0_9) : '—'}</td>
        <td class="num" headers="asia-h-clgrp asia-h-w1049">${r.w10_49 > 0 ? fmtNum(r.w10_49) : '—'}</td>
        <td class="num" headers="asia-h-clgrp asia-h-w50249">${r.w50_249 > 0 ? fmtNum(r.w50_249) : '—'}</td>
        <td class="num" headers="asia-h-clgrp asia-h-wge250">${r.w_ge250 > 0 ? fmtNum(r.w_ge250) : '—'}</td>
        <td class="num" headers="asia-h-totul"><strong>${fmtNum(r.ulTot)}</strong></td>
        <td class="num" headers="asia-h-totadd">${fmtNum(r.addTot)}</td>
      </tr>
    `).join('');
  }
}

init();
</script>

</body>
</html>
